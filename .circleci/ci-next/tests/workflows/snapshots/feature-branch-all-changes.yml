version: '2.1'
orbs:
  keeper: gravitee-io/keeper@0.7.0
  aquasec: gravitee-io/aquasec@1.0.5
  helm: circleci/helm@3.0.0
commands:
  cmd-install-yarn:
    steps:
      - run:
          command: corepack enable || sudo corepack enable
          name: Enable Corepack
      - run:
          command: yarn set version 4.1.1
          name: Set Yarn version
  cmd-notify-on-failure:
    steps:
      - keeper/env-export:
          secret-url: keeper://ZOz4db245GNaETVwmPBk8w/field/password
          var-name: SLACK_ACCESS_TOKEN
      - slack/notify:
          channel: C02JENTV2AX
          branch_pattern: master,[0-9]+\\.[0-9]+\\.x
          event: fail
          template: basic_fail_1
  cmd-restore-maven-job-cache:
    steps:
      - restore_cache:
          keys:
            - gravitee-api-management-v14-<< parameters.jobName >>-{{ .Branch }}-{{ checksum "pom.xml" }}
            - gravitee-api-management-v14-<< parameters.jobName >>-{{ .Branch }}
            - gravitee-api-management-v14-<< parameters.jobName >>-master
    parameters:
      jobName:
        type: string
        default: ''
        description: The job name
    description: Restore Maven cache for a dedicated job
  cmd-save-maven-job-cache:
    steps:
      - run:
          command: rm -rf ~/.m2/repository/io/gravitee/apim
          name: Exclude all APIM artefacts from cache.
      - save_cache:
          key: gravitee-api-management-v14-<< parameters.jobName >>-{{ .Branch }}-{{ checksum "pom.xml" }}
          paths:
            - ~/.m2
          when: always
    parameters:
      jobName:
        type: string
        default: ''
        description: The job name
    description: Save Maven cache for a dedicated job
  cmd-workspace-install:
    steps:
      - restore_cache:
          keys:
            - gravitee-api-management-v14-workspace-{{ checksum "yarn.lock" }}
      - run:
          command: yarn install --immutable
          name: Install
      - save_cache:
          key: gravitee-api-management-v14-workspace-{{ checksum "yarn.lock" }}
          paths:
            - .yarn/cache
          when: always
  cmd-webui-install:
    steps:
      - restore_cache:
          keys:
            - gravitee-api-management-v14-webui-<< parameters.apim-ui-project >>-{{ checksum "<< parameters.apim-ui-project >>/yarn.lock" }}
      - run:
          command: yarn install --immutable
          name: Install
          working_directory: << parameters.apim-ui-project >>
      - save_cache:
          key: gravitee-api-management-v14-webui-<< parameters.apim-ui-project >>-{{ checksum "<< parameters.apim-ui-project >>/yarn.lock" }}
          paths:
            - << parameters.apim-ui-project >>/.yarn/cache
          when: always
    parameters:
      apim-ui-project:
        type: string
        default: ''
        description: WebUI project directory
jobs:
  job-danger-js:
    docker:
      - image: cimg/node:22.12.0
    resource_class: small
    steps:
      - checkout:
          path: .
      - cmd-install-yarn: {}
      - keeper/env-export:
          secret-url: keeper://TIlcGPFq4rN5GvgnZb9hng/field/password
          var-name: DANGER_GITHUB_API_TOKEN
      - run:
          command: cd .circleci/danger && yarn install && yarn run danger
          name: Run Danger JS
  job-test-apim-charts:
    docker:
      - image: cimg/base:stable
    resource_class: small
    steps:
      - checkout:
          path: .
      - helm/install_helm_client:
          version: v3.12.3
      - run:
          command: helm plugin install https://github.com/helm-unittest/helm-unittest --version 0.5.1
          name: Install helm unittest plugin
      - run:
          command: helm lint helm/apim3 && helm lint helm/apim4
          name: Helm lint
      - run:
          command: helm unittest helm/apim3 && helm unittest helm/apim4
          name: Helm unittest
      - cmd-notify-on-failure: {}
  job-setup:
    docker:
      - image: cimg/base:stable
    resource_class: small
    steps:
      - checkout:
          path: .
      - keeper/env-export:
          secret-url: keeper://7CgijuGiFDSLynRJt1Dm9w/custom_field/xml
          var-name: MAVEN_SETTINGS
      - run:
          command: 'echo $MAVEN_SETTINGS > .gravitee.settings.xml '
      - persist_to_workspace:
          root: .
          paths:
            - .gravitee.settings.xml
  job-validate:
    docker:
      - image: cimg/openjdk:21.0.5
    resource_class: small
    steps:
      - checkout:
          path: .
      - attach_workspace:
          at: .
      - cmd-restore-maven-job-cache:
          jobName: job-validate
      - run:
          command: mvn -s .gravitee.settings.xml validate --no-transfer-progress -Dskip.validation=false -Dgravitee.archrules.skip=false -T 2C -Pall-modules
          name: Validate
      - cmd-notify-on-failure: {}
      - cmd-save-maven-job-cache:
          jobName: job-validate
  job-build:
    docker:
      - image: cimg/openjdk:21.0.5
    resource_class: large
    steps:
      - checkout:
          path: .
      - attach_workspace:
          at: .
      - cmd-restore-maven-job-cache:
          jobName: job-build
      - run:
          command: mvn -s .gravitee.settings.xml clean install --no-transfer-progress --update-snapshots -DskipTests -Dskip.validation=true -Dgravitee.archrules.skip=false -T 2C -Dbundle=dev -P all-modules,integration-tests-modules -DwithJavadoc
          name: Build project
          environment:
            BUILD_ID: '1234'
            BUILD_NUMBER: '1234'
            GIT_COMMIT: 784ff35ca
      - cmd-notify-on-failure: {}
      - save_cache:
          key: gravitee-api-management-v14-build-apim-{{ .Environment.CIRCLE_WORKFLOW_WORKSPACE_ID }}
          paths:
            - ~/.m2/repository/io/gravitee/apim
          when: on_success
      - cmd-save-maven-job-cache:
          jobName: job-build
      - persist_to_workspace:
          root: ./
          paths:
            - ./gravitee-apim-rest-api/gravitee-apim-rest-api-management/gravitee-apim-rest-api-management-rest/target/classes/console-openapi.*
            - ./gravitee-apim-rest-api/gravitee-apim-rest-api-standalone/gravitee-apim-rest-api-standalone-distribution/target/distribution
            - ./gravitee-apim-gateway/gravitee-apim-gateway-standalone/gravitee-apim-gateway-standalone-distribution/target/distribution
  job-test-definition:
    docker:
      - image: cimg/openjdk:21.0.5
    resource_class: small
    steps:
      - checkout:
          path: .
      - attach_workspace:
          at: .
      - cmd-restore-maven-job-cache:
          jobName: job-test-definition
      - restore_cache:
          keys:
            - gravitee-api-management-v14-build-apim-{{ .Environment.CIRCLE_WORKFLOW_WORKSPACE_ID }}
      - run:
          command: mvn --fail-fast -s .gravitee.settings.xml test --no-transfer-progress -Ddefinition-modules -Dskip.validation=true -Dgravitee.archrules.skip=true -T 2C
          name: Run definition tests
      - run:
          command: |-
            mkdir -p ~/test-results/junit/
            find . -type f -regex ".*/target/surefire-reports/.*xml" -exec cp {} ~/test-results/junit/ \;
          name: Save test results
          when: always
      - cmd-notify-on-failure: {}
      - cmd-save-maven-job-cache:
          jobName: job-test-definition
      - store_test_results:
          path: ~/test-results
      - persist_to_workspace:
          root: .
          paths:
            - gravitee-apim-definition/gravitee-apim-definition-coverage/target/site/jacoco-aggregate/
  job-sonarcloud-analysis:
    docker:
      - image: sonarsource/sonar-scanner-cli:11.2
    resource_class: large
    steps:
      - checkout:
          path: .
      - attach_workspace:
          at: .
      - restore_cache:
          keys:
            - gravitee-api-management-v14-sonarcloud-analysis-<< parameters.cache_type >>
      - keeper/env-export:
          secret-url: keeper://9x9YgyU6DWzux4DPoHAzDQ/field/password
          var-name: SONAR_TOKEN
      - run:
          command: sonar-scanner
          name: Run Sonarcloud Analysis
          working_directory: << parameters.working_directory >>
      - cmd-notify-on-failure: {}
      - save_cache:
          key: gravitee-api-management-v14-sonarcloud-analysis-<< parameters.cache_type >>
          paths:
            - /opt/sonar-scanner/.sonar/cache
          when: always
    parameters:
      working_directory:
        type: string
        default: gravitee-apim-rest-api
        description: Directory where the Sonarcloud analysis will be run
      cache_type:
        type: enum
        default: backend
        enum:
          - backend
          - frontend
        description: Type of cache to use
  job-test-gateway:
    docker:
      - image: cimg/openjdk:21.0.5
    resource_class: large
    steps:
      - checkout:
          path: .
      - attach_workspace:
          at: .
      - cmd-restore-maven-job-cache:
          jobName: job-test-gateway
      - restore_cache:
          keys:
            - gravitee-api-management-v14-build-apim-{{ .Environment.CIRCLE_WORKFLOW_WORKSPACE_ID }}
      - run:
          command: mvn --fail-fast -s .gravitee.settings.xml test --no-transfer-progress -Dgateway-modules -Dskip.validation=true -Dgravitee.archrules.skip=true -T 2C
          name: Run gateway tests
      - run:
          command: |-
            mkdir -p ~/test-results/junit/
            find . -type f -regex ".*/target/surefire-reports/.*xml" -exec cp {} ~/test-results/junit/ \;
          name: Save test results
          when: always
      - cmd-notify-on-failure: {}
      - cmd-save-maven-job-cache:
          jobName: job-test-gateway
      - store_test_results:
          path: ~/test-results
      - persist_to_workspace:
          root: .
          paths:
            - gravitee-apim-gateway/gravitee-apim-gateway-coverage/target/site/jacoco-aggregate/
  job-test-rest-api:
    docker:
      - image: cimg/openjdk:21.0.5
    resource_class: xlarge
    steps:
      - checkout:
          path: .
      - attach_workspace:
          at: .
      - cmd-restore-maven-job-cache:
          jobName: job-test-rest-api
      - restore_cache:
          keys:
            - gravitee-api-management-v14-build-apim-{{ .Environment.CIRCLE_WORKFLOW_WORKSPACE_ID }}
      - run:
          command: mvn --fail-fast -s .gravitee.settings.xml test --no-transfer-progress -Drest-api-modules -Dskip.validation=true -Dgravitee.archrules.skip=true
          name: Run rest-api tests
      - run:
          command: |-
            mkdir -p ~/test-results/junit/
            find . -type f -regex ".*/target/surefire-reports/.*xml" -exec cp {} ~/test-results/junit/ \;
          name: Save test results
          when: always
      - cmd-notify-on-failure: {}
      - cmd-save-maven-job-cache:
          jobName: job-test-rest-api
      - store_test_results:
          path: ~/test-results
      - persist_to_workspace:
          root: .
          paths:
            - gravitee-apim-rest-api/gravitee-apim-rest-api-coverage/target/site/jacoco-aggregate/
  job-test-integration:
    docker:
      - image: cimg/openjdk:21.0.5
    resource_class: xlarge
    steps:
      - checkout:
          path: .
      - attach_workspace:
          at: .
      - cmd-restore-maven-job-cache:
          jobName: job-test-integration
      - restore_cache:
          keys:
            - gravitee-api-management-v14-build-apim-{{ .Environment.CIRCLE_WORKFLOW_WORKSPACE_ID }}
      - run:
          command: mvn --fail-fast -s .gravitee.settings.xml test --no-transfer-progress -Dintegration-test-modules -Dskip.validation=true -Dgravitee.archrules.skip=true
          name: Run integration tests
      - run:
          command: |-
            mkdir -p ~/test-results/junit/
            find . -type f -regex ".*/target/surefire-reports/.*xml" -exec cp {} ~/test-results/junit/ \;
          name: Save test results
          when: always
      - cmd-notify-on-failure: {}
      - cmd-save-maven-job-cache:
          jobName: job-test-integration
      - store_test_results:
          path: ~/test-results
    parallelism: 3
  job-test-plugin:
    docker:
      - image: cimg/openjdk:21.0.5
    resource_class: large
    steps:
      - checkout:
          path: .
      - attach_workspace:
          at: .
      - cmd-restore-maven-job-cache:
          jobName: job-test-plugin
      - restore_cache:
          keys:
            - gravitee-api-management-v14-build-apim-{{ .Environment.CIRCLE_WORKFLOW_WORKSPACE_ID }}
      - run:
          command: mvn --fail-fast -s .gravitee.settings.xml test --no-transfer-progress -Dplugin-modules -Dskip.validation=true -Dgravitee.archrules.skip=true -T 2C
          name: Run plugin tests
      - run:
          command: |-
            mkdir -p ~/test-results/junit/
            find . -type f -regex ".*/target/surefire-reports/.*xml" -exec cp {} ~/test-results/junit/ \;
          name: Save test results
          when: always
      - cmd-notify-on-failure: {}
      - cmd-save-maven-job-cache:
          jobName: job-test-plugin
      - store_test_results:
          path: ~/test-results
      - persist_to_workspace:
          root: .
          paths:
            - gravitee-apim-plugin/gravitee-apim-plugin-coverage/target/site/jacoco-aggregate/
  job-test-reporter:
    docker:
      - image: cimg/openjdk:21.0.5
    resource_class: small
    steps:
      - checkout:
          path: .
      - attach_workspace:
          at: .
      - cmd-restore-maven-job-cache:
          jobName: job-test-reporter
      - restore_cache:
          keys:
            - gravitee-api-management-v14-build-apim-{{ .Environment.CIRCLE_WORKFLOW_WORKSPACE_ID }}
      - run:
          command: mvn --fail-fast -s .gravitee.settings.xml test --no-transfer-progress -Dreporter-modules -Dskip.validation=true -Dgravitee.archrules.skip=true -T 2C
          name: Run reporter tests
      - run:
          command: |-
            mkdir -p ~/test-results/junit/
            find . -type f -regex ".*/target/surefire-reports/.*xml" -exec cp {} ~/test-results/junit/ \;
          name: Save test results
          when: always
      - cmd-notify-on-failure: {}
      - cmd-save-maven-job-cache:
          jobName: job-test-reporter
      - store_test_results:
          path: ~/test-results
      - persist_to_workspace:
          root: .
          paths:
            - gravitee-apim-reporter/gravitee-apim-reporter-coverage/target/site/jacoco-aggregate/
  job-test-repository:
    docker:
      - image: cimg/openjdk:21.0.5
    resource_class: large
    steps:
      - checkout:
          path: .
      - attach_workspace:
          at: .
      - cmd-restore-maven-job-cache:
          jobName: job-test-repository
      - restore_cache:
          keys:
            - gravitee-api-management-v14-build-apim-{{ .Environment.CIRCLE_WORKFLOW_WORKSPACE_ID }}
      - run:
          command: mvn --fail-fast -s .gravitee.settings.xml verify --no-transfer-progress -Drepository-modules -Dskip.validation=true -Dgravitee.archrules.skip=true
          name: Run repository tests
      - run:
          command: |-
            mkdir -p ~/test-results/junit/
            find . -type f -regex ".*/target/surefire-reports/.*xml" -exec cp {} ~/test-results/junit/ \;
          name: Save test results
          when: always
      - cmd-notify-on-failure: {}
      - cmd-save-maven-job-cache:
          jobName: job-test-repository
      - store_test_results:
          path: ~/test-results
      - persist_to_workspace:
          root: .
          paths:
            - gravitee-apim-repository/gravitee-apim-repository-coverage/target/site/jacoco-aggregate/
  job-nx-format-check:
    docker:
      - image: cimg/node:22.12.0
    resource_class: medium
    steps:
      - checkout:
          path: .
      - cmd-install-yarn: {}
      - cmd-workspace-install: {}
      - run:
          command: yarn nx format:check --all
          name: Check prettier formatting
  job-webui-libs-lint-test:
    docker:
      - image: cimg/node:22.12.0
    resource_class: medium
    steps:
      - checkout:
          path: .
      - cmd-install-yarn: {}
      - cmd-workspace-install: {}
      - attach_workspace:
          at: .
      - run:
          command: yarn nx affected -t lint --exclude=console,portal-next
          name: Lint APIM Libs (affected)
      - run:
          command: NODE_OPTIONS=--max-old-space-size=4096 yarn nx affected -t test --exclude=console,portal-next --coverage --maxWorkers=2
          name: Test APIM Libs (affected)
      - cmd-notify-on-failure: {}
      - run:
          command: |-
            mkdir -p gravitee-apim-webui-libs/gravitee-markdown/coverage
            mkdir -p gravitee-apim-webui-libs/gravitee-dashboard/coverage
            touch gravitee-apim-webui-libs/gravitee-markdown/coverage/lcov.info
            touch gravitee-apim-webui-libs/gravitee-dashboard/coverage/lcov.info
          name: Ensure coverage files exist
      - persist_to_workspace:
          root: .
          paths:
            - gravitee-apim-webui-libs/gravitee-markdown/coverage/lcov.info
      - store_artifacts:
          path: gravitee-apim-webui-libs/gravitee-markdown/coverage/lcov.info
      - store_test_results:
          path: gravitee-apim-webui-libs/gravitee-markdown/coverage/junit.xml
      - persist_to_workspace:
          root: .
          paths:
            - gravitee-apim-webui-libs/gravitee-dashboard/coverage/lcov.info
      - store_artifacts:
          path: gravitee-apim-webui-libs/gravitee-dashboard/coverage/lcov.info
      - store_test_results:
          path: gravitee-apim-webui-libs/gravitee-dashboard/coverage/junit.xml
  job-nx-webui-lint-test:
    docker:
      - image: cimg/node:22.12.0
    resource_class: << parameters.resource_class >>
    steps:
      - checkout:
          path: .
      - cmd-install-yarn: {}
      - cmd-workspace-install: {}
      - attach_workspace:
          at: .
      - run:
          command: yarn nx run << parameters.nx-project >>:lint-license
          name: Check License
      - run:
          command: yarn nx lint << parameters.nx-project >>
          name: Run Prettier and ESLint
      - run:
          command: yarn nx test << parameters.nx-project >> --coverage --maxWorkers=<< parameters.max-workers >>
          name: Run unit tests
      - cmd-notify-on-failure: {}
      - persist_to_workspace:
          root: .
          paths:
            - << parameters.apim-ui-project >>/coverage/lcov.info
      - store_artifacts:
          path: << parameters.apim-ui-project >>/coverage/lcov.info
      - store_test_results:
          path: << parameters.apim-ui-project >>/coverage/junit.xml
    parameters:
      apim-ui-project:
        type: string
        default: ''
        description: the directory name of the UI project
      nx-project:
        type: string
        default: ''
        description: the Nx project name
      resource_class:
        type: string
        default: medium
        description: Resource class to use for executor
      max-workers:
        type: string
        default: 35%
        description: Maximum number of workers for Jest tests
  job-console-webui-build:
    docker:
      - image: cimg/node:22.12.0
    resource_class: large
    steps:
      - checkout:
          path: .
      - cmd-install-yarn: {}
      - cmd-workspace-install: {}
      - attach_workspace:
          at: .
      - run:
          command: yarn nx build console --configuration=production
          name: Build Console
      - cmd-notify-on-failure: {}
      - persist_to_workspace:
          root: .
          paths:
            - gravitee-apim-console-webui/dist/
  job-storybook-console:
    docker:
      - image: cimg/node:22.12.0
    resource_class: large
    steps:
      - checkout:
          path: .
      - cmd-install-yarn: {}
      - cmd-workspace-install: {}
      - attach_workspace:
          at: .
      - run:
          command: yarn nx run console:build-storybook
          name: Build Storybook
      - cmd-notify-on-failure: {}
      - persist_to_workspace:
          root: .
          paths:
            - gravitee-apim-console-webui/storybook-static/
  job-chromatic-console:
    docker:
      - image: cimg/node:22.12.0
    resource_class: small
    steps:
      - checkout:
          path: .
      - cmd-install-yarn: {}
      - cmd-workspace-install: {}
      - attach_workspace:
          at: .
      - keeper/env-export:
          secret-url: keeper://Hp1bFl5s0doxnQgqkMdCdg/field/password
          var-name: CHROMATIC_PROJECT_TOKEN
      - run:
          command: yarn nx run console:chromatic --exit-zero-on-changes --exit-once-uploaded --storybook-build-dir=storybook-static
          name: Deploy to Chromatic
          working_directory: gravitee-apim-console-webui
  job-webui-lint-test:
    docker:
      - image: cimg/node:22.12.0
    resource_class: << parameters.resource_class >>
    steps:
      - checkout:
          path: .
      - cmd-install-yarn: {}
      - cmd-webui-install:
          apim-ui-project: << parameters.apim-ui-project >>
      - attach_workspace:
          at: .
      - run:
          command: yarn lint:license
          name: Check License
          working_directory: << parameters.apim-ui-project >>
      - run:
          command: yarn lint
          name: Run Prettier and ESLint
          working_directory: << parameters.apim-ui-project >>
      - run:
          command: yarn test:coverage
          name: Run unit tests
          working_directory: << parameters.apim-ui-project >>
      - cmd-notify-on-failure: {}
      - persist_to_workspace:
          root: .
          paths:
            - << parameters.apim-ui-project >>/coverage/lcov.info
      - store_artifacts:
          path: << parameters.apim-ui-project >>/coverage/lcov.info
      - store_test_results:
          path: << parameters.apim-ui-project >>/coverage/junit.xml
    parameters:
      apim-ui-project:
        type: string
        default: ''
        description: the directory name of the UI project
      resource_class:
        type: string
        default: medium
        description: Resource class to use for executor
  job-portal-webui-build:
    docker:
      - image: cimg/node:22.12.0
    resource_class: large
    steps:
      - checkout:
          path: .
      - cmd-install-yarn: {}
      - cmd-workspace-install: {}
      - attach_workspace:
          at: .
      - run:
          command: yarn build
          name: Build Portal
          working_directory: gravitee-apim-portal-webui
      - run:
          command: yarn nx build portal-next --configuration=production
          name: Build Portal Next
      - cmd-notify-on-failure: {}
      - persist_to_workspace:
          root: .
          paths:
            - gravitee-apim-portal-webui/dist/
            - gravitee-apim-portal-webui-next/dist/
  job-validate-workflow-status:
    docker:
      - image: cimg/base:stable
    resource_class: small
    steps:
      - run:
          command: echo "Congratulations! If you can read this, everything is OK"
          name: Check workflow jobs
workflows:
  pull_requests:
    jobs:
      - aquasec/fs_scan:
          context: &a1
            - cicd-orchestrator
          pre-steps:
            - keeper/env-export:
                secret-url: keeper://QeHHkvALPob4pgs1hMd9Gw/custom_field/API Key
                var-name: AQUA_KEY
            - keeper/env-export:
                secret-url: keeper://QeHHkvALPob4pgs1hMd9Gw/custom_field/Secret
