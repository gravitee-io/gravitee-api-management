version: '2.1'
orbs:
  keeper: gravitee-io/keeper@0.7.0
  aquasec: gravitee-io/aquasec@1.0.5
  slack: circleci/slack@4.12.5
commands:
  cmd-install-yarn:
    steps:
      - run:
          command: corepack enable || sudo corepack enable
          name: Enable Corepack
      - run:
          command: yarn set version 4.1.1
          name: Set Yarn version
  cmd-workspace-install:
    steps:
      - restore_cache:
          keys:
            - gravitee-api-management-v14-workspace-{{ checksum "yarn.lock" }}
      - run:
          command: yarn install --immutable
          name: Install
      - save_cache:
          key: gravitee-api-management-v14-workspace-{{ checksum "yarn.lock" }}
          paths:
            - .yarn/cache
          when: always
  cmd-webui-install:
    steps:
      - restore_cache:
          keys:
            - gravitee-api-management-v14-webui-<< parameters.apim-ui-project >>-{{ checksum "<< parameters.apim-ui-project >>/yarn.lock" }}
      - run:
          command: yarn install --immutable
          name: Install
          working_directory: << parameters.apim-ui-project >>
      - save_cache:
          key: gravitee-api-management-v14-webui-<< parameters.apim-ui-project >>-{{ checksum "<< parameters.apim-ui-project >>/yarn.lock" }}
          paths:
            - << parameters.apim-ui-project >>/.yarn/cache
          when: always
    parameters:
      apim-ui-project:
        type: string
        default: ''
        description: WebUI project directory
  cmd-notify-on-failure:
    steps:
      - keeper/env-export:
          secret-url: keeper://ZOz4db245GNaETVwmPBk8w/field/password
          var-name: SLACK_ACCESS_TOKEN
      - slack/notify:
          channel: C02JENTV2AX
          branch_pattern: master,[0-9]+\\.[0-9]+\\.x
          event: fail
          template: basic_fail_1
  cmd-restore-maven-job-cache:
    steps:
      - restore_cache:
          keys:
            - gravitee-api-management-v14-<< parameters.jobName >>-{{ .Branch }}-{{ checksum "pom.xml" }}
            - gravitee-api-management-v14-<< parameters.jobName >>-{{ .Branch }}
            - gravitee-api-management-v14-<< parameters.jobName >>-master
    parameters:
      jobName:
        type: string
        default: ''
        description: The job name
    description: Restore Maven cache for a dedicated job
  cmd-save-maven-job-cache:
    steps:
      - run:
          command: rm -rf ~/.m2/repository/io/gravitee/apim
          name: Exclude all APIM artefacts from cache.
      - save_cache:
          key: gravitee-api-management-v14-<< parameters.jobName >>-{{ .Branch }}-{{ checksum "pom.xml" }}
          paths:
            - ~/.m2
          when: always
    parameters:
      jobName:
        type: string
        default: ''
        description: The job name
    description: Save Maven cache for a dedicated job
jobs:
  job-danger-js:
    docker:
      - image: cimg/node:22.12.0
    resource_class: small
    steps:
      - checkout:
          path: .
      - cmd-install-yarn: {}
      - keeper/env-export:
          secret-url: keeper://TIlcGPFq4rN5GvgnZb9hng/field/password
          var-name: DANGER_GITHUB_API_TOKEN
      - run:
          command: cd .circleci/danger && yarn install && yarn run danger
          name: Run Danger JS
  job-nx-format-check:
    docker:
      - image: cimg/node:22.12.0
    resource_class: medium
    steps:
      - checkout:
          path: .
      - cmd-install-yarn: {}
      - cmd-workspace-install: {}
      - run:
          command: yarn nx format:check --all
          name: Check prettier formatting
  job-webui-lint-test:
    docker:
      - image: cimg/node:22.12.0
    resource_class: << parameters.resource_class >>
    steps:
      - checkout:
          path: .
      - cmd-install-yarn: {}
      - cmd-webui-install:
          apim-ui-project: << parameters.apim-ui-project >>
      - attach_workspace:
          at: .
      - run:
          command: yarn lint:license
          name: Check License
          working_directory: << parameters.apim-ui-project >>
      - run:
          command: yarn lint
          name: Run Prettier and ESLint
          working_directory: << parameters.apim-ui-project >>
      - run:
          command: yarn test:coverage
          name: Run unit tests
          working_directory: << parameters.apim-ui-project >>
      - cmd-notify-on-failure: {}
      - persist_to_workspace:
          root: .
          paths:
            - << parameters.apim-ui-project >>/coverage/lcov.info
      - store_artifacts:
          path: << parameters.apim-ui-project >>/coverage/lcov.info
      - store_test_results:
          path: << parameters.apim-ui-project >>/coverage/junit.xml
    parameters:
      apim-ui-project:
        type: string
        default: ''
        description: the directory name of the UI project
      resource_class:
        type: string
        default: medium
        description: Resource class to use for executor
  job-sonarcloud-analysis:
    docker:
      - image: sonarsource/sonar-scanner-cli:11.2
    resource_class: large
    steps:
      - checkout:
          path: .
      - attach_workspace:
          at: .
      - restore_cache:
          keys:
            - gravitee-api-management-v14-sonarcloud-analysis-<< parameters.cache_type >>
      - keeper/env-export:
          secret-url: keeper://9x9YgyU6DWzux4DPoHAzDQ/field/password
          var-name: SONAR_TOKEN
      - run:
          command: sonar-scanner
          name: Run Sonarcloud Analysis
          working_directory: << parameters.working_directory >>
      - cmd-notify-on-failure: {}
      - save_cache:
          key: gravitee-api-management-v14-sonarcloud-analysis-<< parameters.cache_type >>
          paths:
            - /opt/sonar-scanner/.sonar/cache
          when: always
    parameters:
      working_directory:
        type: string
        default: gravitee-apim-rest-api
        description: Directory where the Sonarcloud analysis will be run
      cache_type:
        type: enum
        default: backend
        enum:
          - backend
          - frontend
        description: Type of cache to use
  job-portal-webui-build:
    docker:
      - image: cimg/node:22.12.0
    resource_class: large
    steps:
      - checkout:
          path: .
      - cmd-install-yarn: {}
      - cmd-workspace-install: {}
      - attach_workspace:
          at: .
      - run:
          command: yarn build
          name: Build Portal
          working_directory: gravitee-apim-portal-webui
      - run:
          command: yarn nx build portal-next --configuration=production
          name: Build Portal Next
      - cmd-notify-on-failure: {}
      - persist_to_workspace:
          root: .
          paths:
            - gravitee-apim-portal-webui/dist/
            - gravitee-apim-portal-webui-next/dist/
  job-validate-workflow-status:
    docker:
      - image: cimg/base:stable
    resource_class: small
    steps:
      - run:
          command: echo "Congratulations! If you can read this, everything is OK"
          name: Check workflow jobs
workflows:
  pull_requests:
    jobs:
      - aquasec/fs_scan:
          context: &a1
            - cicd-orchestrator
          pre-steps:
            - keeper/env-export:
                secret-url: keeper://QeHHkvALPob4pgs1hMd9Gw/custom_field/API Key
                var-name: AQUA_KEY
            - keeper/env-export:
                secret-url: keeper://QeHHkvALPob4pgs1hMd9Gw/custom_field/Secret
                var-name: AQUA_SECRET
            - keeper/env-export:
                secret-url: keeper://TIlcGPFq4rN5GvgnZb9hng/field/password
                var-name: GITHUB_TOKEN
      - job-danger-js:
          name: Run Danger JS
          context: *a1
      - job-nx-format-check:
          name: Check prettier formatting for nx projects
          context: *a1
      - job-webui-lint-test:
          name: Lint & test APIM Portal
          context: *a1
          apim-ui-project: gravitee-apim-portal-webui
          resource_class: large
      - job-sonarcloud-analysis:
          name: Sonar - gravitee-apim-portal-webui
          requires:
            - Lint & test APIM Portal
          context: *a1
          working_directory: gravitee-apim-portal-webui
          cache_type: frontend
      - job-portal-webui-build:
          name: Build APIM Portal
          context: *a1
      - job-validate-workflow-status:
          name: Validate workflow status
          requires:
            - Check prettier formatting for nx projects
            - Lint & test APIM Portal
            - Build APIM Portal
