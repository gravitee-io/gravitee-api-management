version: 2.1
setup: false
parameters:
  gio_action:
    type: string
    default: pull_requests
    description: ""
  dry_run:
    type: boolean
    default: true
    description: Run in dry run mode?
  docker_tag_as_latest:
    type: boolean
    default: false
    description: Is this version the latest version available?
  graviteeio_version:
    type: string
    default: ""
    description: Version of APIM to be used in docker images
  apim_version_path:
    type: string
    default: /home/circleci/project/pom.xml
    description: Path to pom.xml with APIM version
commands:
  cmd-restore-maven-job-cache:
    parameters:
      jobName:
        type: string
        default: ""
        description: The job name
    steps:
      - restore_cache:
          keys:
            - gravitee-api-management-v14-<< parameters.jobName >>-{{ .Branch }}-{{ checksum "pom.xml" }}
            - gravitee-api-management-v14-<< parameters.jobName >>-{{ .Branch }}
    description: Restore Maven cache for a dedicated job
  cmd-prepare-gpg:
    steps:
      - keeper/install
      - run:
          command: |-
            ksm secret notation keeper://riW92t8X4tk4ZmQc8-FZ4Q/custom_field/armor_format_pub_key > pub.key
            gpg --import pub.key

            ksm secret notation keeper://riW92t8X4tk4ZmQc8-FZ4Q/custom_field/armor_format_private_key > private.key
            # Need --batch to be able to import private key
            gpg --import --batch private.key
    description: Prepare GPG command
  cmd-save-maven-job-cache:
    parameters:
      jobName:
        type: string
        default: ""
        description: The job name
    steps:
      - run:
          name: Exclude all APIM artefacts from cache.
          command: rm -rf ~/.m2/repository/io/gravitee/apim
      - save_cache:
          key: gravitee-api-management-v14-<< parameters.jobName >>-{{ .Branch }}-{{ checksum "pom.xml" }}
          paths:
            - ~/.m2
          when: always
    description: Save Maven cache for a dedicated job
jobs:
  job-setup:
    docker:
      - image: cimg/base:stable
    resource_class: small
    steps:
      - checkout
      - keeper/env-export:
          secret-url: keeper://7CgijuGiFDSLynRJt1Dm9w/custom_field/xml
          var-name: MAVEN_SETTINGS
      - run:
          command: "echo $MAVEN_SETTINGS > .gravitee.settings.xml "
      - persist_to_workspace:
          root: .
          paths:
            - .gravitee.settings.xml
  job-release-commit-and-prepare-next-version:
    docker:
      - image: cimg/base:stable
    resource_class: medium
    steps:
      - checkout
      - attach_workspace:
          at: .
      - add_ssh_keys:
          fingerprints:
            - ac:88:23:8f:c6:0f:7d:f0:fc:df:73:20:34:56:02:6c
      - keeper/env-export:
          secret-url: keeper://IZd-yvsMopfQEa_0j1SDvg/field/login
          var-name: GIT_USER_NAME
      - keeper/env-export:
          secret-url: keeper://IZd-yvsMopfQEa_0j1SDvg/custom_field/email
          var-name: GIT_USER_EMAIL
      - run:
          name: Git config
          command: |-
            git config --global user.name "${GIT_USER_NAME}"
             git config --global user.email "${GIT_USER_EMAIL}"
      - run:
          name: "Git release "
          command: |
            # Remove `-SNAPSHOT` from source
            # Backend
            sed -i "s#<changelist>.*</changelist>#<changelist></changelist>#" pom.xml

            # UI
            sed -i 's/"version": ".*"/"version": "1.2.3"/' gravitee-apim-console-webui/build.json
            sed -i 's/"version": ".*"/"version": "1.2.3"/' gravitee-apim-portal-webui/build.json
            sed -i 's/"version": ".*"/"version": "1.2.3"/' gravitee-apim-portal-webui-next/build.json

            git add --update
            git commit -m "1.2.3"
            git tag 1.2.3

            # Set the version to the next version (bump patch version + '-SNAPSHOT')
            sed -i "s#<revision>.*</revision>#<revision>1.2.4</revision>#" pom.xml                   
            sed -i "s#<changelist>.*</changelist>#<changelist>-SNAPSHOT</changelist>#" pom.xml
            sed -i "s#<sha1>.*</sha1>#<sha1></sha1>#" pom.xml

            sed -i 's#version: ".*"#version: "1.2.4-SNAPSHOT"#' gravitee-apim-rest-api/gravitee-apim-rest-api-portal/gravitee-apim-rest-api-portal-rest/src/main/resources/portal-openapi.yaml
            sed -i 's#"version": ".*"#"version": "1.2.4-SNAPSHOT"#' gravitee-apim-console-webui/build.json
            sed -i 's#"version": ".*"#"version": "1.2.4-SNAPSHOT"#' gravitee-apim-portal-webui/build.json
            sed -i 's#"version": ".*"#"version": "1.2.4-SNAPSHOT"#' gravitee-apim-portal-webui-next/build.json

            # Helm chart increase version, appVersion and clean the artifacthub.io/changes annotation
            sed -e "0,/^version:/{s/version:.*/version: 1.2.4/}" \
                -e "0,/^appVersion:/{ s/appVersion.*/appVersion: 1.2.4/ }" \
                -e '/artifacthub.io\/changes/,${ s/|// }' \
                -e '/artifacthub.io\/changes:/q0' \
                -i helm/Chart.yaml

            git add --update
            git commit -m 'chore: prepare next version [skip ci]'

            git push -u  origin master
            git push --tags  origin master
  job-nexus-staging:
    docker:
      - image: cimg/openjdk:21.0.9-node
    resource_class: xlarge
    steps:
      - checkout
      - run:
          name: Checkout tag 1.2.3
          command: git checkout 1.2.3
      - cmd-restore-maven-job-cache:
          jobName: job-nexus-staging
      - attach_workspace:
          at: .
      - cmd-prepare-gpg
      - run:
          name: Release on Nexus
          command: mvn clean deploy --activate-profiles gravitee-release --batch-mode -T 4 -DskipTests -Dskip.validation=true -Dgravitee.archrules.skip=true --settings .gravitee.settings.xml --update-snapshots
      - cmd-save-maven-job-cache:
          jobName: job-nexus-staging
workflows:
  maven_release:
    jobs:
      - job-setup:
          context:
            - cicd-orchestrator
          name: Setup
      - job-release-commit-and-prepare-next-version:
          context:
            - cicd-orchestrator
          name: Commit and prepare next version
          requires:
            - Setup
      - job-nexus-staging:
          context:
            - cicd-orchestrator
          name: Nexus staging
          requires:
            - Commit and prepare next version
orbs:
  keeper: gravitee-io/keeper@0.7.0
