name: Structural debt metrics

on:
  schedule:
    # Mondays 08:00 UTC
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Needed so the bot commit can push back to the same branch
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Collect structural metrics
        run: node tech-debt/collect-metrics.mjs

      - name: Fetch SonarCloud summary
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: node tech-debt/fetch-sonar-summary.mjs
        continue-on-error: true

      - name: Generate report
        run: node tech-debt/generate-report.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tech-debt/metrics tech-debt/TECH-DEBT-REPORT.md
          if git diff --staged --quiet; then
            echo "No metric/report changes."
          else
            git commit -m "chore(tech-debt): refresh structural debt snapshot"
            git push
          fi
