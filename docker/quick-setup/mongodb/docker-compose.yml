version: '3.8'

networks:
    frontend:
        name: frontend
    storage:
        name: storage
    email:
        name: email

volumes:
    data-elasticsearch:
    data-mongo:
    apim-mongodb-logs:
    apim-gateway-logs:
    apim-management-api-logs:
    apim-management-ui-logs:
    apim-portal-ui-logs:
    db-postgres:

services:
    mongodb:
        image: mongo:${MONGODB_VERSION:-6.0}
        container_name: apim_mongodb
        ports:
            - '27017:27017'
        restart: always
        volumes:
            - data-mongo:/data/db
            - apim-mongodb-logs:/var/log/mongodb
        healthcheck:
            test: mongosh --eval 'db.runCommand({serverStatus:1}).ok' --quiet | grep 1
            interval: 5s
            timeout: 3s
            retries: 10
        networks:
            - storage

    pg_database:
        container_name: apim-qs-psql-db
        image: postgres:13
        restart: always
        environment:
            POSTGRES_DB: gravitee
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: password
            PGDATA: /var/lib/postgresql/data
        volumes:
            - ./.data/db-postgres:/var/lib/postgresql/data
        ports:
            - '0.0.0.0:5432:5432'
        networks:
            - storage

    elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:${ELASTIC_VERSION:-8.17.2}
        container_name: apim_elasticsearch
        restart: always
        ports:
            - '9200:9200'
            - '9300:9300'
        volumes:
            - data-elasticsearch:/usr/share/elasticsearch/data
        environment:
            - http.host=0.0.0.0
            - transport.host=0.0.0.0
            - xpack.security.enabled=false
            - cluster.name=elasticsearch
            - bootstrap.memory_lock=true
            - discovery.type=single-node
            - 'ES_JAVA_OPTS=-Xms512m -Xmx512m'
        ulimits:
            memlock:
                soft: -1
                hard: -1
            nofile: 65536
        healthcheck:
            test: ['CMD', 'curl', '-f', 'http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s']
            interval: 5s
            timeout: 3s
            retries: 10
        networks:
            - storage

    mailhog:
        image: mailhog/mailhog
        container_name: gio_apim_mailhog
        restart: always
        ports:
            - '8025:8025'
            - '1025:1025'
        networks:
            - email
