########################
# KRaft — single-node cluster "US"
########################
node.id=0
process.roles=broker,controller
controller.quorum.voters=0@localhost:9094
controller.listener.names=CONTROLLER
inter.broker.listener.name=PLAINTEXT

########################
# Listeners — PLAINTEXT only (gateway is the security boundary in this demo)
########################
listeners=PLAINTEXT://0.0.0.0:9091,CONTROLLER://0.0.0.0:9094
advertised.listeners=PLAINTEXT://kafka-us:9091,CONTROLLER://kafka-us:9094
listener.security.protocol.map=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT

########################
# Single-broker safeguards (defensive for newer Kafka versions where some of
# these default to 3, which would prevent the internal topics from being
# created on a single-node cluster).
########################
offsets.topic.replication.factor=1
transaction.state.log.replication.factor=1
transaction.state.log.min.isr=1
share.coordinator.state.topic.replication.factor=1
share.coordinator.state.topic.min.isr=1

########################
# Misc
########################
num.partitions=1
auto.create.topics.enable=true
log.dirs=/var/lib/kafka/data
