# Variant of the `native-kafka/` quick-setup demonstrating a MESH virtual cluster
# (the gateway fronts two backend Kafka clusters as a single virtual cluster).
#
# Topology:
#   - kafka-eu  : single-node KRaft cluster, advertised as kafka-eu:9091
#   - kafka-us  : single-node KRaft cluster, advertised as kafka-us:9091
#   - gateway   : exposes the virtual cluster at global.kafka.local:9092
#
# The gateway maps virtual broker ids to backends via VirtualBrokerIdMapper:
#   cluster 0 broker 0 → virtual id 10000 → broker-10000-global.kafka.local
#   cluster 1 broker 0 → virtual id 20000 → broker-20000-global.kafka.local

version: '3.8'

networks:
    frontend:
        name: frontend-mesh
    storage:
        name: storage-mesh
    kafka:
        name: kafka-mesh
        driver: bridge
    email:
        name: email-mesh
    gateway:
        name: gateway-mesh

volumes:
    data-elasticsearch:
    data-mongo:
    data-kafka-eu:
    data-kafka-us:

services:
    mongodb:
        image: mongo:${MONGODB_VERSION:-6.0}
        container_name: gio_apim_mesh_mongodb
        restart: always
        volumes:
            - data-mongo:/data/db
            - ./.logs/apim-mongodb:/var/log/mongodb
        healthcheck:
            test: mongosh --eval 'db.runCommand({serverStatus:1}).ok' --quiet | grep 1
            interval: 5s
            timeout: 3s
            retries: 10
        networks:
            - storage

    elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:${ELASTIC_VERSION:-8.17.2}
        container_name: gio_apim_mesh_elasticsearch
        restart: always
        ports:
            - '9200:9200'
        volumes:
            - data-elasticsearch:/usr/share/elasticsearch/data
        environment:
            - http.host=0.0.0.0
            - transport.host=0.0.0.0
            - xpack.security.enabled=false
            - cluster.name=elasticsearch
            - bootstrap.memory_lock=true
            - discovery.type=single-node
            - 'ES_JAVA_OPTS=-Xms512m -Xmx512m'
        ulimits:
            memlock:
                soft: -1
                hard: -1
            nofile: 65536
        healthcheck:
            test: ['CMD', 'curl', '-f', 'http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s']
            interval: 5s
            timeout: 3s
            retries: 10
        networks:
            - storage

    gateway:
        image: ${APIM_REGISTRY:-graviteeio}/apim-gateway:${APIM_VERSION:-latest}
        container_name: gio_apim_mesh_gateway
        restart: always
        ports:
            - '8082:8082'
            - '9092:9092'
        depends_on:
            mongodb:
                condition: service_healthy
            elasticsearch:
                condition: service_healthy
        volumes:
            - ./.logs/apim-gateway:/opt/graviteeio-gateway/logs
            - ./.license:/opt/graviteeio-gateway/license
            - ./.ssl:/opt/graviteeio-gateway/ssl
            - ./.config/logback.xml:/opt/graviteeio-gateway/config/logback.xml
        environment:
            - gravitee_management_mongodb_uri=mongodb://mongodb:27017/gravitee?serverSelectionTimeoutMS=5000&connectTimeoutMS=5000&socketTimeoutMS=5000
            - gravitee_ratelimit_mongodb_uri=mongodb://mongodb:27017/gravitee?serverSelectionTimeoutMS=5000&connectTimeoutMS=5000&socketTimeoutMS=5000
            - gravitee_reporters_elasticsearch_endpoints_0=http://elasticsearch:9200
            - gravitee_kafka_enabled=true
            - gravitee_kafka_ssl_keystore_password=gravitee
            - gravitee_kafka_ssl_keystore_path=$${gravitee.home}/ssl/server.keystore.jks
            - gravitee_kafka_ssl_keystore_type=jks
            - 'gravitee_kafka_routingHostMode_defaultDomain=kafka.local'
        networks:
            storage:
            frontend:
            kafka:
            gateway:
                aliases:
                    # Bootstrap host the client connects to (entrypoint hostPrefix is "global")
                    - global.kafka.local
                    # Virtual broker ids exposed by MESH. With 2 single-node backends:
                    #   cluster 0 broker 0 → virtual id 10000
                    #   cluster 1 broker 0 → virtual id 20000
                    - broker-10000-global.kafka.local
                    - broker-20000-global.kafka.local

    management_api:
        image: ${APIM_REGISTRY:-graviteeio}/apim-management-api:${APIM_VERSION:-latest}
        container_name: gio_apim_mesh_management_api
        restart: always
        ports:
            - '8083:8083'
        depends_on:
            mongodb:
                condition: service_healthy
            elasticsearch:
                condition: service_healthy
        volumes:
            - ./.logs/apim-management-api:/opt/graviteeio-management-api/logs
            - ./.license:/opt/graviteeio-management-api/license
        environment:
            - gravitee_management_mongodb_uri=mongodb://mongodb:27017/gravitee?serverSelectionTimeoutMS=5000&connectTimeoutMS=5000&socketTimeoutMS=5000
            - gravitee_analytics_elasticsearch_endpoints_0=http://elasticsearch:9200
            - gravitee_email_enabled=true
            - gravitee_email_host=mailhog
            - gravitee_email_port=1025
            - gravitee_email_subject="TEST"
            - gravitee_email_from="user@my.domain"
            # Pre-seed the Entrypoints & Sharding Tags → Default Kafka Domain pattern.
            # Maps Key.PORTAL_KAFKA_DOMAIN (isOverridable=true, scope SYSTEM). The `{apiHost}`
            # placeholder is substituted with the API's host prefix at runtime, so an API with
            # entrypoint host `global` will resolve to `global.kafka.local:9092` — matching the
            # gateway's *.kafka.local SNI handler and the docker DNS aliases declared above.
            - 'gravitee_portal_kafkaDomain={apiHost}.kafka.local'
        networks:
            - storage
            - frontend
            - email

    management_ui:
        image: ${APIM_REGISTRY:-graviteeio}/apim-management-ui:${APIM_VERSION:-latest}
        container_name: gio_apim_mesh_management_ui
        restart: always
        ports:
            - '8084:8080'
        depends_on:
            - management_api
        environment:
            - MGMT_API_URL=http://localhost:8083/management/
        volumes:
            - ./.logs/apim-management-ui:/var/log/nginx
        networks:
            - frontend

    portal_ui:
        image: ${APIM_REGISTRY:-graviteeio}/apim-portal-ui:${APIM_VERSION:-latest}
        container_name: gio_apim_mesh_portal_ui
        restart: always
        ports:
            - '8085:8080'
        depends_on:
            - management_api
        environment:
            - PORTAL_API_URL=http://localhost:8083/portal
        volumes:
            - ./.logs/apim-portal-ui:/var/log/nginx
        networks:
            - frontend

    mailhog:
        image: mailhog/mailhog
        container_name: gio_apim_mesh_mailhog
        restart: always
        ports:
            - '8025:8025'
            - '1025:1025'
        networks:
            - email

    # Two independent single-node KRaft clusters. Each gets its own data volume and
    # cluster id; `kafka-storage.sh format` is run once per broker on first start.

    kafka-eu-init:
        image: apache/kafka:3.9.2
        container_name: gio_apim_mesh_kafka_eu_init
        volumes:
            - data-kafka-eu:/var/lib/kafka/data
            - ./.config/server-eu.properties:/opt/kafka/config/kraft/server.properties
        command: >
            bash -c "
            if [ ! -f /var/lib/kafka/data/meta.properties ]; then
              echo 'Formatting kafka-eu storage...';
              /opt/kafka/bin/kafka-storage.sh format -t vn5xkioqQoiJqtTM-R_pgw -c /opt/kafka/config/kraft/server.properties;
            else
              echo 'kafka-eu storage already formatted.';
            fi
            "

    kafka-eu:
        image: apache/kafka:3.9.2
        container_name: gio_apim_mesh_kafka_eu
        hostname: kafka-eu
        networks:
            - kafka
        depends_on:
            kafka-eu-init:
                condition: service_completed_successfully
        volumes:
            - ./.config/server-eu.properties:/opt/kafka/config/kraft/server.properties
            - data-kafka-eu:/var/lib/kafka/data
        command: >
            /opt/kafka/bin/kafka-server-start.sh /opt/kafka/config/kraft/server.properties

    kafka-us-init:
        image: apache/kafka:3.9.2
        container_name: gio_apim_mesh_kafka_us_init
        volumes:
            - data-kafka-us:/var/lib/kafka/data
            - ./.config/server-us.properties:/opt/kafka/config/kraft/server.properties
        command: >
            bash -c "
            if [ ! -f /var/lib/kafka/data/meta.properties ]; then
              echo 'Formatting kafka-us storage...';
              /opt/kafka/bin/kafka-storage.sh format -t k9JxuHfVRv-pFmCDDJOGuw -c /opt/kafka/config/kraft/server.properties;
            else
              echo 'kafka-us storage already formatted.';
            fi
            "

    kafka-us:
        image: apache/kafka:3.9.2
        container_name: gio_apim_mesh_kafka_us
        hostname: kafka-us
        networks:
            - kafka
        depends_on:
            kafka-us-init:
                condition: service_completed_successfully
        volumes:
            - ./.config/server-us.properties:/opt/kafka/config/kraft/server.properties
            - data-kafka-us:/var/lib/kafka/data
        command: >
            /opt/kafka/bin/kafka-server-start.sh /opt/kafka/config/kraft/server.properties

    # Lightweight Kafka client container — used only to drive producer/consumer commands
    # against the gateway (global.kafka.local:9092) for the README walkthrough.
    kafka-client:
        image: apache/kafka:3.9.2
        container_name: gio_apim_mesh_kafka_client
        volumes:
            - ./.kafka-client-config:/app/config
            - ./.ssl:/app/.ssl
        depends_on:
            - gateway
        entrypoint: ['tail', '-f', '/dev/null']
        working_dir: /app
        networks:
            - gateway
