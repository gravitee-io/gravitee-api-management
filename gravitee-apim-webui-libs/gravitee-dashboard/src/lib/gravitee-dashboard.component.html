<div class="container">
  <div class="dashboard-toolbar">
    @if (showTitle()) {
      <h1 class="dashboard-title">{{ localName() }}</h1>
    }

    <div class="toolbar-actions">
      @if (capabilities().canAddWidget) {
        <button mat-raised-button color="primary" disabled [matTooltip]="'Coming soon'">
          <mat-icon>add</mat-icon>
          New widget
        </button>
      }

      @if (hasMenu()) {
        <button
          mat-icon-button
          aria-label="Dashboard options"
          data-testid="dashboard-options-btn"
          [matMenuTriggerFor]="dashboardMenu"
          [matTooltip]="'Dashboard options'"
        >
          <mat-icon>more_vert</mat-icon>
        </button>
        <mat-menu #dashboardMenu>
          @if (capabilities().canEditMetadata) {
            <button mat-menu-item (click)="openMetadataDialog()" data-testid="edit-dashboard-item">
              <mat-icon>edit</mat-icon>
              Edit
            </button>
          }
          @if (capabilities().canDeleteDashboard) {
            <button mat-menu-item class="delete-action" (click)="deleteRequested.emit()" data-testid="delete-dashboard-item">
              <mat-icon>delete</mat-icon>
              Delete
            </button>
          }
        </mat-menu>
      }
    </div>
  </div>

  <gd-generic-filter-bar
    [filters]="filters()"
    [currentSelectedFilters]="currentSelectedFilters()"
    [defaultPeriod]="'5m'"
    (selectedFilters)="onSelectedFilters($event)"
    (refresh)="onRefresh()"
    class="filterBar"
  />

  <gd-grid
    [items]="dashboardWidgets()"
    [editMode]="capabilities().canEditLayout"
    (widgetsChange)="onWidgetsChange($event)"
    (layoutChange)="onLayoutChange($event)"
  />
</div>
