apiVersion: gravitee.io/v1alpha1
kind: Portal
metadata:
  name: developer-portal
spec:
  hrid: developer-portal
  name: Developer Portal
  layout: sidebar-content
  showFooter: true
  portalLabel: Developer Portal
  portalIconUrl: https://cdn.example.com/brand/portal-icon.svg
  footerLinks:
    - label: Documentation
      url: https://docs.example.com
    - label: Support
      url: https://support.example.com
    - label: Status
      url: https://status.example.com
  userMenuItems:
    - label: Profile
      url: /profile
    - label: Applications
      url: /applications
    - label: Log out
      url: /logout
  navigation:
    - path: /
      displayName: Home
      type: PAGE
      order: 0
    - path: /guides
      displayName: Guides
      type: FOLDER
      order: 1
    - path: /guides/quick-start
      displayName: Quick Start
      type: PAGE
      order: 0
    - path: /guides/authentication
      displayName: Authentication
      type: PAGE
      order: 1
    - path: /catalog
      displayName: API Catalog
      type: PAGE
      order: 2
    - path: /apis
      displayName: APIs
      type: FOLDER
      order: 3
    - path: /apis/commerce-platform-api
      displayName: Commerce Platform API
      type: PAGE
      order: 0
    - path: /apis/payments-api
      displayName: Payments API
      type: API
      order: 1
    - path: /changelog
      displayName: Changelog
      type: PAGE
      order: 4
---
apiVersion: gravitee.io/v1alpha1
kind: PortalListing
metadata:
  name: developer-portal-listing
spec:
  hrid: developer-portal-listing
  apis:
    - apiHrid: commerce-platform-api
      location: /apis
      order: 0
    - apiHrid: payments-api
      location: /apis
      order: 1
---
apiVersion: gravitee.io/v1alpha1
kind: PortalTheme
metadata:
  name: developer-portal-theme
spec:
  portalHrid: developer-portal
  schemaVersion: 1
  activeMode: system
  foundation:
    light:
      primary: "#6366f1"
      primaryForeground: "#ffffff"
      background: "#ffffff"
      surface: "#f8fafc"
      text: "#0f172a"
      fontFamily: "Inter, system-ui, -apple-system, sans-serif"
      headingFontFamily: "Inter, system-ui, -apple-system, sans-serif"
      borderRadius: "8px"
    dark:
      primary: "#818cf8"
      primaryForeground: "#0f172a"
      background: "#0f172a"
      surface: "#1e293b"
      text: "#f1f5f9"
  elements:
    button:
      filled:
        light:
          borderRadius: lg
          background: "var(--portal-custom-brand-accent)"
        dark:
          borderRadius: lg
      outlined:
        light:
          borderColor: "var(--portal-custom-brand-accent)"
          foreground: "var(--portal-color-text)"
        dark:
          borderColor: "var(--portal-custom-brand-accent)"
    header:
      light:
        background: "#1e293b"
        height: "56px"
      dark:
        background: "#0f172a"
    sidebar:
      light:
        background: "var(--portal-color-background)"
        itemHoverBackground: "var(--portal-color-muted)"
      dark:
        background: "var(--portal-color-background)"
    card:
      light:
        borderRadius: lg
        background: "var(--portal-color-surface)"
      dark:
        background: "var(--portal-color-surface)"
    subscriptionViewer:
      light:
        borderRadius: md
      dark: {}
  customVariables:
    - name: brand-accent
      lightValue: "#ff6600"
      darkValue: "#ff9944"
    - name: hero-btn-bg
      lightValue: "#ef4444"
      darkValue: "#f87171"
    - name: hero-gradient-start
      lightValue: "#667eea"
      darkValue: "#4c51bf"
    - name: hero-gradient-end
      lightValue: "#764ba2"
      darkValue: "#553c9a"
    - name: card-catalog-bg
      lightValue: "#eff6ff"
      darkValue: "#1e3a5f"
---
apiVersion: gravitee.io/v1alpha1
kind: PortalBlockPage
metadata:
  name: developer-portal-homepage
spec:
  portalHrid: developer-portal
  hrid: homepage
  name: Home
  location: /
  order: 0
  document:
    - type: columnList
      props:
        columns: "2"
        class: home-hero-grid
      children:
        - type: column
          props:
            width: 1
          children:
            - type: heading
              props:
                level: 1
                textAlignment: left
              content:
                - type: text
                  text: Welcome to the Developer Portal
                  styles: {}
              children: []
            - type: paragraph
              props:
                textAlignment: left
              content:
                - type: text
                  text: Ship integrations faster with curated APIs, live documentation, and observability built in.
                  styles: {}
              children: []
            - type: graviteeButton
              props:
                label: Explore all APIs
                link: /catalog
                appearance: filled
                instanceStyle: '{"background":"hero-btn-bg"}'
                pickLinkOpen: "false"
              children: []
            - type: graviteeButton
              props:
                label: Get started
                link: /guides/quick-start
                appearance: outlined
                instanceStyle: "{}"
                pickLinkOpen: "false"
              children: []
        - type: column
          props:
            width: 1
          children:
            - type: image
              props:
                url: assets/homepage/desk.png
                caption: Homepage picture
                previewWidth: 512
                name: homepage-cover-photo
              children: []
    - type: heading
      props:
        level: 2
        textAlignment: left
      content:
        - type: text
          text: Your toolkit for building
          styles: {}
      children: []
    - type: columnList
      props:
        columns: "3"
      children:
        - type: column
          props:
            width: 1
          children:
            - type: graviteeCard
              props:
                title: API catalog
                subtitle: Browse and test all available APIs in one place.
                icon: book
                color: blue
                buttonLabel: Browse APIs
                instanceStyle: '{"background":"card-catalog-bg"}'
              children: []
        - type: column
          props:
            width: 1
          children:
            - type: graviteeCard
              props:
                title: Quick start
                subtitle: Make your first authenticated API call in minutes.
                icon: rocket
                color: purple
                buttonLabel: Start guide
                instanceStyle: "{}"
              children: []
        - type: column
          props:
            width: 1
          children:
            - type: graviteeCard
              props:
                title: Subscriptions
                subtitle: Manage keys, plans, and webhook endpoints.
                icon: key
                color: green
                buttonLabel: View subscriptions
                instanceStyle: "{}"
              children: []
    - type: graviteeApiCatalog
      props:
        title: Featured APIs
        viewMode: grid
        tileTemplate: ""
      children: []
    - type: graviteeHtml
      props:
        html: |
          <section class="partners-section">
            <h2>Trusted by partners</h2>
            <p>Embed live API data in your own dashboards.</p>
            <div data-gravitee-component="subscription-list" data-api-id="commerce-platform-api"></div>
          </section>
        css: |
          .partners-section {
            margin-top: 2rem;
            padding: 2rem;
            border-radius: var(--portal-spacing-border-radius);
            background: linear-gradient(135deg, var(--portal-custom-hero-gradient-start), var(--portal-custom-hero-gradient-end));
            color: var(--portal-color-primary-foreground);
          }
          .partners-section h2 {
            margin: 0 0 0.5rem;
            font-family: var(--portal-font-heading-family);
          }
      children: []
    - type: graviteeSubscriptionViewer
      props: {}
      children: []
---
apiVersion: gravitee.io/v1alpha1
kind: PortalPage
metadata:
  name: developer-portal-homepage-markup
spec:
  portalHrid: developer-portal
  hrid: homepage
