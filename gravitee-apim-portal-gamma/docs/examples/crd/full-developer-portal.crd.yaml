---
apiVersion: gravitee.io/v1alpha1
kind: PortalDocumentation
metadata:
  name: developer-portal-commerce-platform-api
spec:
  portalHrid: developer-portal
  hrid: commerce-platform-api
  name: Commerce Platform API
  type: OPENAPI
  location: /apis/commerce-platform-api
  order: 0
  renderer: gravitee-docs
  specSource:
    type: INLINE
  content: |
    {
      "openapi": "3.0.3",
      "info": {
        "title": "Commerce Platform API",
        "version": "3.2.0",
        "description": "Product catalog, orders, and fulfillment for partner integrations."
      },
      "servers": [
        { "url": "https://api.commerce.example.com/v3", "description": "Production" },
        { "url": "https://sandbox.commerce.example.com/v3", "description": "Sandbox" }
      ],
      "tags": [
        { "name": "Products", "description": "Browse and search the product catalog" },
        { "name": "Orders", "description": "Create and track customer orders" }
      ],
      "paths": {
        "/products": {
          "get": {
            "tags": ["Products"],
            "summary": "List products",
            "operationId": "listProducts",
            "parameters": [
              { "name": "limit", "in": "query", "schema": { "type": "integer", "default": 20 } },
              { "name": "q", "in": "query", "schema": { "type": "string" } }
            ],
            "responses": {
              "200": {
                "description": "Paginated product list",
                "content": {
                  "application/json": {
                    "schema": { "$ref": "#/components/schemas/ProductList" }
                  }
                }
              }
            }
          }
        },
        "/orders": {
          "post": {
            "tags": ["Orders"],
            "summary": "Create order",
            "operationId": "createOrder",
            "requestBody": {
              "required": true,
              "content": {
                "application/json": {
                  "schema": { "$ref": "#/components/schemas/CreateOrderRequest" }
                }
              }
            },
            "responses": {
              "201": { "description": "Order created" }
            }
          }
        }
      },
      "components": {
        "schemas": {
          "ProductList": {
            "type": "object",
            "properties": {
              "items": { "type": "array", "items": { "$ref": "#/components/schemas/Product" } },
              "nextCursor": { "type": "string" }
            }
          },
          "Product": {
            "type": "object",
            "properties": {
              "id": { "type": "string", "example": "prod_7hK2mNqR9vX1" },
              "name": { "type": "string" },
              "price": { "type": "integer", "description": "Minor units (cents)" }
            }
          },
          "CreateOrderRequest": {
            "type": "object",
            "required": ["productId", "quantity"],
            "properties": {
              "productId": { "type": "string" },
              "quantity": { "type": "integer", "minimum": 1 }
            }
          }
        },
        "securitySchemes": {
          "oauth2": {
            "type": "oauth2",
            "flows": {
              "clientCredentials": {
                "tokenUrl": "https://auth.commerce.example.com/oauth/token",
                "scopes": { "orders:write": "Create orders", "products:read": "Read catalog" }
              }
            }
          }
        }
      },
      "security": [{ "oauth2": ["products:read"] }]
    }
---
apiVersion: gravitee.io/v1alpha1
kind: PortalDocumentation
metadata:
  name: developer-portal-changelog
spec:
  portalHrid: developer-portal
  hrid: changelog
  name: Changelog
  type: HTML
  location: /changelog
  order: 4
  followLayoutWidth: true
  content: |
    <article class="changelog">
      <header>
        <h1>Portal changelog</h1>
        <p class="subtitle">Release notes for the developer portal experience.</p>
      </header>

      <section>
        <h2>2026-07-01 — Theme sidebar</h2>
        <ul>
          <li>Replaced dialog theme editor with a right-side panel.</li>
          <li>Added custom variable highlight-users action.</li>
        </ul>
      </section>

      <section>
        <h2>2026-06-15 — HTML blocks</h2>
        <ul>
          <li>Custom HTML now renders in the main DOM with scoped CSS.</li>
          <li>Added <code>data-gravitee-component</code> slot hydration.</li>
        </ul>
      </section>
    </article>
  css: |
    .changelog {
      max-width: var(--portal-layout-max-width);
      margin: 0 auto;
      padding: 2rem 1rem;
      font-family: var(--portal-font-family);
      color: var(--portal-color-text);
    }
    .changelog h1 {
      font-family: var(--portal-font-heading-family);
      color: var(--portal-color-primary);
    }
    .changelog .subtitle {
      color: var(--portal-color-muted-foreground);
    }
    .changelog section {
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--portal-color-border);
    }
    .changelog code {
      background: var(--portal-color-muted);
      padding: 0.125rem 0.375rem;
      border-radius: 4px;
    }
