    <gravitee-heading level="2">Your toolkit for building</gravitee-heading>

    <gravitee-grid columns="3">
      <gravitee-cell>
        <gravitee-card
          title="API catalog"
          subtitle="Browse and test all available APIs in one place."
          icon="book"
          color="blue"
          button-label="Browse APIs"
          instance-style-background="card-catalog-bg">
        </gravitee-card>
      </gravitee-cell>

      <gravitee-cell>
        <gravitee-card
