# Protected file patterns — one per line, substring-matched against full path.
# Lines starting with # are comments. Blank lines are ignored.

# Secrets & credentials
.env
credentials.json
.pem
.key

# Lock files (managed by package managers)
package-lock.json
pnpm-lock.yaml
yarn.lock
poetry.lock
uv.lock

# Git internals
.git/

# Build artifacts & caches
node_modules/
dist/
build/
target/
__pycache__/

# IDE configuration
.idea/
