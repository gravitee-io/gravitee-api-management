{{- if and (.Values.api.enabled) (not .Values.apim.dbLess) -}}
{{- $apiHttpRoute := default dict .Values.api.httpRoute -}}
{{- $httpRoute := default dict (get $apiHttpRoute "automation") -}}
{{- if (default false (get $httpRoute "enabled")) -}}
{{- $serviceAPIName := include "gravitee.api.fullname" . -}}
{{- $serviceAPIPort := .Values.api.service.externalPort -}}
{{- $path := default "/automation" $httpRoute.path -}}
{{- $pathMatchType := default "PathPrefix" $httpRoute.pathMatchType -}}
{{- $hostnames := default (list) $httpRoute.hostnames -}}
{{- $filters := default (list) $httpRoute.filters -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $serviceAPIName }}-automation
  labels:
    app.kubernetes.io/name: {{ template "gravitee.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Values.api.image.tag | default .Chart.AppVersion | quote }}
    app.kubernetes.io/component: "{{ .Values.api.name }}"
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    {{- if and .Values.common .Values.common.labels }}
    {{- range $key, $value := .Values.common.labels }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
    {{- end }}
  {{- $hasAnnotations := or $httpRoute.annotations (and .Values.common .Values.common.annotations) }}
  {{- if $hasAnnotations }}
  annotations:
    {{- if $httpRoute.annotations }}
    {{- range $key, $value := $httpRoute.annotations }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
    {{- end }}
    {{- if and .Values.common .Values.common.annotations }}
    {{- range $key, $value := .Values.common.annotations }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
    {{- end }}
  {{- end }}
spec:
  parentRefs:
    - name: {{ required "api.httpRoute.automation.gatewayName is required when api.httpRoute.automation.enabled=true" $httpRoute.gatewayName }}
      {{- if $httpRoute.gatewayNamespace }}
      namespace: {{ $httpRoute.gatewayNamespace }}
      {{- end }}
      {{- if $httpRoute.sectionName }}
      sectionName: {{ $httpRoute.sectionName }}
      {{- end }}
  {{- if gt (len $hostnames) 0 }}
  hostnames:
    {{- range $hostname := $hostnames }}
    - {{ $hostname | quote }}
    {{- end }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: {{ $pathMatchType }}
            value: {{ $path }}
      {{- if gt (len $filters) 0 }}
      filters:
{{ toYaml $filters | indent 8 }}
      {{- end }}
      backendRefs:
        - name: {{ $serviceAPIName }}
          port: {{ $serviceAPIPort }}
{{- end -}}
{{- end -}}
