suite: Test portal configmap failures
templates:
  - "portal/portal-configmap.yaml"
tests:
  - it: Should fall back to the default apim.example.com portal baseURL when ingress and httpRoute are disabled and no portal.baseURL is set
    template: portal/portal-configmap.yaml
    set:
      api:
        ingress:
          portal:
            enabled: false
        httpRoute:
          portal:
            enabled: false
      portal:
        baseURL:
    asserts:
      - matchRegex:
          path: data["config.json"]
          pattern: '"baseURL": "https://apim\.example\.com/portal"'