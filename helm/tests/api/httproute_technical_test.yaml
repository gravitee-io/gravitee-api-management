suite: Test API Technical HTTPRoute
templates:
  - "api/api-httproute-technical.yaml"
tests:
  - it: Does not render by default
    asserts:
      - hasDocuments:
          count: 0

  - it: Does not render when core http is disabled
    set:
      api:
        http:
          services:
            core:
              http:
                enabled: false
              httpRoute:
                enabled: true
                gatewayName: traefik
    asserts:
      - hasDocuments:
          count: 0

  - it: Renders an HTTPRoute when core http and httpRoute are enabled
    set:
      api:
        http:
          services:
            core:
              httpRoute:
                enabled: true
                gatewayName: traefik
                hostnames:
                  - technical.example.com
                pathMatchType: PathPrefix
                path: /
              service:
                externalPort: 18083
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: HTTPRoute
      - isAPIVersion:
          of: gateway.networking.k8s.io/v1
      - equal:
          path: metadata.name
          value: RELEASE-NAME-apim-api-technical
      - equal:
          path: spec.parentRefs[0].name
          value: traefik
      - equal:
          path: spec.hostnames[0]
          value: technical.example.com
      - equal:
          path: spec.rules[0].matches[0].path.type
          value: PathPrefix
      - equal:
          path: spec.rules[0].matches[0].path.value
          value: /
      - equal:
          path: spec.rules[0].backendRefs[0].name
          value: RELEASE-NAME-apim-api
      - equal:
          path: spec.rules[0].backendRefs[0].port
          value: 18083

  - it: Uses core httpRoute values when core ingress and httpRoute are both enabled
    set:
      api:
        http:
          services:
            core:
              ingress:
                enabled: true
                hosts:
                  - ingress.example.com
                pathType: Prefix
                path: /ingress-tech
              httpRoute:
                enabled: true
                gatewayName: traefik
                hostnames:
                  - technical.example.com
                pathMatchType: PathPrefix
                path: /
              service:
                externalPort: 18083
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: spec.hostnames[0]
          value: technical.example.com
      - equal:
          path: spec.rules[0].matches[0].path.value
          value: /

  - it: Does not render in dbLess mode
    set:
      apim:
        dbLess: true
      api:
        http:
          services:
            core:
              httpRoute:
                enabled: true
                gatewayName: traefik
    asserts:
      - hasDocuments:
          count: 0

  - it: Renders with filters
    set:
      api:
        http:
          services:
            core:
              httpRoute:
                enabled: true
                gatewayName: traefik
                hostnames:
                  - technical.example.com
                path: /
                filters:
                  - type: ExtensionRef
                    extensionRef:
                      group: traefik.io
                      kind: Middleware
                      name: basic-auth
              service:
                externalPort: 18083
    asserts:
      - equal:
          path: spec.rules[0].filters[0].extensionRef.name
          value: basic-auth
