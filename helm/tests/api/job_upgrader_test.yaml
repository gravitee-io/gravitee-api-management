suite: Test Management API Upgrader Job
templates:
  - "api/api-upgrader-job.yaml"
  - "api/api-configmap.yaml"
tests:
  - it: Check upgrade mode is enabled
    set:
      api:
        upgrader: true
    template: api/api-upgrader-job.yaml
    chart:
      version: 1.0.0-chart
      appVersion: 1.0.0-app
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Job
      - isAPIVersion:
          of: batch/v1
      - equal:
          path: spec.template.spec.containers[0].image
          value: graviteeio/apim-management-api:1.0.0-app
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: GRAVITEE_UPGRADE_MODE
            value: "true"
      - notExists:
          # It should not contain init containers by default
          path: spec.template.spec.initContainers


  - it: Check that sync services have been disabled
    template: api/api-upgrader-job.yaml
    set:
      api:
        upgrader: true
    asserts:
      - hasDocuments:
          count: 1
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: GRAVITEE_SERVICES_SYNC_ENABLED
            value: "false"

  - it: Should render additional plugins init container
    template: api/api-upgrader-job.yaml
    set:
      api:
        upgrader: true
        additionalPlugins:
          - https://d.g.io/toto.zip
    asserts:
      - hasDocuments:
          count: 1
      - contains:
          path: spec.template.spec.initContainers
          content:
            name: get-plugins
            env: []
            image: alpine:latest
            imagePullPolicy: Always
            securityContext:
              runAsNonRoot: true
              runAsUser: 1001
            command: ['sh', '-c', "mkdir -p /tmp/plugins && cd /tmp/plugins && ( rm  toto.zip  2>/dev/null || true ) && wget https://d.g.io/toto.zip"]
            volumeMounts:
              - name: graviteeio-apim-plugins
                mountPath: /tmp/plugins
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[1].name
          value: graviteeio-apim-plugins
      - equal:
          path: spec.template.spec.volumes[1].name
          value: graviteeio-apim-plugins

  - it: Should adapt additional plugins init container security context for OpenShift
    template: api/api-upgrader-job.yaml
    set:
      openshift:
        enabled: true
      api:
        upgrader: true
        additionalPlugins:
          - https://d.g.io/toto.zip
    asserts:
      - notExists:
          path: spec.template.spec.initContainers[0].securityContext.runAsUser
      - equal:
          path: spec.template.spec.initContainers[0].securityContext.runAsNonRoot
          value: true
      - notExists:
          path: spec.template.spec.containers[0].securityContext.runAsUser
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsNonRoot
          value: true

  - it: Should not adapt additional plugins init container security context when disabled
    template: api/api-upgrader-job.yaml
    set:
      openshift:
        enabled: true
        adaptSecurityContext: disabled
      api:
        upgrader: true
        additionalPlugins:
          - https://d.g.io/toto.zip
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].securityContext.runAsUser
          value: 1001
      - equal:
          path: spec.template.spec.initContainers[0].securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsUser
          value: 1001
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsNonRoot
          value: true

  - it: Check that alerts have been disabled
    template: api/api-upgrader-job.yaml
    set:
      api:
        upgrader: true
    asserts:
      - hasDocuments:
          count: 1
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: GRAVITEE_ALERTS_ALERT-ENGINE_ENABLED
            value: "false"

  - it: Should not download bundled PostgreSQL JDBC driver
    template: api/api-upgrader-job.yaml
    set:
      api:
        upgrader: true
      management:
        type: "jdbc"
      jdbc:
        url: "jdbc:postgresql://db:5432/gravitee"
    asserts:
      - notExists:
          path: spec.template.spec.initContainers
      - notExists:
          path: spec.template.spec.containers[0].volumeMounts[1]
      - notExists:
          path: spec.template.spec.volumes[1]

  - it: Should copy MySQL JDBC driver from dedicated image
    template: api/api-upgrader-job.yaml
    set:
      api:
        upgrader: true
      management:
        type: "jdbc"
      jdbc:
        driverSource: "image"
        url: "jdbc:mysql://db:3306/gravitee"
        image:
          repository: "customer/mysql-jdbc"
          tag: "9.3.0"
          pullPolicy: "IfNotPresent"
    asserts:
      - contains:
          path: spec.template.spec.initContainers
          content:
            name: copy-repository-jdbc-ext
            image: "customer/mysql-jdbc:9.3.0"
            imagePullPolicy: IfNotPresent
            command: [ 'sh', '-c', "mkdir -p /tmp/plugins-ext && cp /drivers/mysql-connector-j.jar /tmp/plugins-ext/" ]
            env: []
            securityContext:
              runAsNonRoot: true
              runAsUser: 1001
            volumeMounts:
            - name: graviteeio-apim-repository-jdbc-ext
              mountPath: /tmp/plugins-ext
      - notContains:
          path: spec.template.spec.initContainers
          content:
            name: get-repository-jdbc-ext

  - it: Check that cockpit has been disabled
    template: api/api-upgrader-job.yaml
    set:
      api:
        upgrader: true
    asserts:
      - hasDocuments:
          count: 1
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: GRAVITEE_COCKPIT_ENABLED
            value: "false"

  - it: Check that cloud has been disabled
    template: api/api-upgrader-job.yaml
    set:
      api:
        upgrader: true
    asserts:
      - hasDocuments:
          count: 1
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: GRAVITEE_CLOUD_ENABLED
            value: "false"

  - it: Check that federation have been disabled
    template: api/api-upgrader-job.yaml
    set:
      api:
        upgrader: true
    asserts:
      - hasDocuments:
          count: 1
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: GRAVITEE_INTEGRATION_ENABLED
            value: "false"

  - it: Check that standalone mode is enabled
    template: api/api-upgrader-job.yaml
    set:
      api:
        upgrader: true
    asserts:
      - hasDocuments:
          count: 1
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: GRAVITEE_CLUSTER_TYPE
            value: "standalone"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: GRAVITEE_CACHE_TYPE
            value: "standalone"

  - it: Check if the helm hook annotations are present
    set:
      api:
        upgrader: true
    template: api/api-upgrader-job.yaml
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Job
      - isAPIVersion:
          of: batch/v1
      - equal:
          path: metadata.annotations
          value:
            helm.sh/hook: pre-upgrade
            helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: pre-upgrade
      - equal:
          path: metadata.annotations["helm.sh/hook-delete-policy"]
          value: before-hook-creation,hook-succeeded

  - it: Check if the upgrader manifest is disabled by default
    template: api/api-upgrader-job.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: Check DB Less mode
    set:
      global:
        kubeVersion: 1.23.0
      apim:
        dbLess: true
    asserts:
      - hasDocuments:
          count: 0
