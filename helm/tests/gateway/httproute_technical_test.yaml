suite: Test API Gateway Technical HTTPRoute
templates:
  - "gateway/gateway-technical-httproute.yaml"
tests:
  - it: Does not render by default
    asserts:
      - hasDocuments:
          count: 0

  - it: Renders an HTTPRoute when core httpRoute is enabled
    set:
      gateway:
        services:
          core:
            httpRoute:
              enabled: true
              gatewayName: traefik
              hostnames:
                - technical.example.com
              pathMatchType: PathPrefix
              path: /
            service:
              externalPort: 18082
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: HTTPRoute
      - isAPIVersion:
          of: gateway.networking.k8s.io/v1
      - equal:
          path: metadata.name
          value: RELEASE-NAME-apim-gateway-technical
      - equal:
          path: spec.parentRefs[0].name
          value: traefik
      - equal:
          path: spec.hostnames[0]
          value: technical.example.com
      - equal:
          path: spec.rules[0].matches[0].path.type
          value: PathPrefix
      - equal:
          path: spec.rules[0].matches[0].path.value
          value: /
      - equal:
          path: spec.rules[0].backendRefs[0].name
          value: RELEASE-NAME-apim-gateway
      - equal:
          path: spec.rules[0].backendRefs[0].port
          value: 18082

  - it: Ignores gateway.services.core.ingress values when both ingress and httpRoute are enabled
    set:
      gateway:
        services:
          core:
            ingress:
              enabled: true
              hosts:
                - ingress.example.com
              pathType: Prefix
              path: /ingress-technical
            httpRoute:
              enabled: true
              gatewayName: traefik
              hostnames:
                - technical.example.com
              pathMatchType: PathPrefix
              path: /
            service:
              externalPort: 18082
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: spec.hostnames[0]
          value: technical.example.com
      - equal:
          path: spec.rules[0].matches[0].path.value
          value: /

  - it: Fails when gateway.services.core.httpRoute.path is missing
    set:
      gateway:
        services:
          core:
            httpRoute:
              enabled: true
              gatewayName: traefik
              hostnames:
                - technical.example.com
              pathMatchType: PathPrefix
    asserts:
      - failedTemplate:
          errorMessage: "gateway.services.core.httpRoute.path is required when gateway.services.core.httpRoute.enabled=true"

  - it: Fails when gateway.services.core.httpRoute.pathMatchType is missing
    set:
      gateway:
        services:
          core:
            httpRoute:
              enabled: true
              gatewayName: traefik
              hostnames:
                - technical.example.com
              path: /
    asserts:
      - failedTemplate:
          errorMessage: "gateway.services.core.httpRoute.pathMatchType is required when gateway.services.core.httpRoute.enabled=true"

  - it: Fails when gateway.services.core.httpRoute.hostnames is empty
    set:
      gateway:
        services:
          core:
            httpRoute:
              enabled: true
              gatewayName: traefik
              pathMatchType: PathPrefix
              path: /
    asserts:
      - failedTemplate:
          errorMessage: "gateway.services.core.httpRoute.hostnames must contain at least one hostname when gateway.services.core.httpRoute.enabled=true"

  - it: Renders with filters
    set:
      gateway:
        services:
          core:
            httpRoute:
              enabled: true
              gatewayName: traefik
              hostnames:
                - technical.example.com
              pathMatchType: PathPrefix
              path: /
              filters:
                - type: ExtensionRef
                  extensionRef:
                    group: traefik.io
                    kind: Middleware
                    name: basic-auth
            service:
              externalPort: 18082
    asserts:
      - equal:
          path: spec.rules[0].filters[0].extensionRef.name
          value: basic-auth

  - it: Does not render when gateway is disabled
    set:
      gateway:
        enabled: false
        services:
          core:
            httpRoute:
              enabled: true
              gatewayName: traefik
    asserts:
      - hasDocuments:
          count: 0

  - it: Renders common labels and annotations
    chart:
      version: 3.1.0
      appVersion: 3.21.0
    set:
      common:
        labels:
          acme.com/team: api
        annotations:
          acme.com/feature: products
      gateway:
        services:
          core:
            httpRoute:
              enabled: true
              gatewayName: traefik
              hostnames:
                - technical.example.com
              pathMatchType: PathPrefix
              path: /
            service:
              externalPort: 18082
    asserts:
      - equal:
          path: metadata.labels["acme.com/team"]
          value: api
      - equal:
          path: metadata.annotations["acme.com/feature"]
          value: products
