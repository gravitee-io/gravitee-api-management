suite: Test deployment and configmap with a volumeMount named config defined
templates:
  - "gammaUi/gammaUi-deployment.yaml"
  - "gammaUi/gammaUi-configmap.yaml"
set:
  gamma:
    enabled: true
  gammaUi:
    enabled: true
tests:
  - it: Should NOT generate gamma-configmap.yaml
    template: gammaUi/gammaUi-configmap.yaml
    set:
      gammaUi:
        extraVolumes: |
          - name: config
            secret:
              secretName: gravitee-yml-secret-name
    asserts:
      - hasDocuments:
          count: 0

  - it: Should generate gamma-configmap.yaml
    template: gammaUi/gammaUi-configmap.yaml
    set:
    asserts:
      - hasDocuments:
          count: 1

  - it: Should generate a volume named config in gamma-deployment.yaml
    template: gammaUi/gammaUi-deployment.yaml
    set:
      gammaUi:
        extraVolumes: |
          - name: config
            secret:
              secretName: gravitee-yml-secret-name
    asserts:
      - hasDocuments:
          count: 1
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: config
            mountPath: /usr/share/nginx/html/constants.json
            subPath: constants.json
      - contains:
          path: spec.template.spec.volumes
          content:
            name: config
            secret:
              secretName: gravitee-yml-secret-name

  - it: Should NOT generate a volume named config in gamma-deployment.yaml
    template: gammaUi/gammaUi-deployment.yaml
    set:
    asserts:
      - hasDocuments:
          count: 1
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: config
            mountPath: /usr/share/nginx/html/constants.json
            subPath: constants.json
      - notContains:
          path: spec.template.spec.volumes
          content:
            name: config
            secret:
              secretName: gravitee-yml-secret-name
