suite: Test Gamma default PDB
templates:
  - "gammaUi/gammaUi-pdb.yaml"
tests:
  - it: should generate nothing when Gamma is disabled
    template: gammaUi/gammaUi-pdb.yaml
    set:
      gamma:
        enabled: true
      gammaUi:
        enabled: false
    release:
      name: my-apim
      namespace: unittest
    asserts:
      - hasDocuments:
          count: 0

  - it: should generate PDB when Gamma is enabled and PDB is enabled
    template: gammaUi/gammaUi-pdb.yaml
    set:
      gamma:
        enabled: true
      gammaUi:
        enabled: true
        pdb:
          enabled: true
    release:
      name: my-apim
      namespace: unittest
    chart:
      version: 1.0.0-chart
      appVersion: 1.0.0-app
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: PodDisruptionBudget
      - equal:
          path: metadata.labels
          value:
            app.kubernetes.io/component: gamma
            app.kubernetes.io/instance: my-apim
            app.kubernetes.io/managed-by: Helm
            app.kubernetes.io/name: apim
            app.kubernetes.io/version: 1.0.0-app
            helm.sh/chart: apim-1.0.0-chart
      - equal:
          path: spec.maxUnavailable
          value: 50%
      - notExists:
          path: spec.minAvailable
