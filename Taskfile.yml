version: '3'

includes:
  dist:
    taskfile: Taskfile.dist.yml
    flatten: true

env:
  DOCKER_REGISTRY: '{{.DOCKER_REGISTRY | default "graviteeio.azurecr.io"}}'
  DOCKER_TAG: '{{.DOCKER_TAG | default "local"}}'

tasks:
  check:
    desc: "Verify formatting on changed modules"
    cmds:
      - mvn prettier:check -pl gravitee-apim-rest-api/gravitee-apim-rest-api-service,gravitee-apim-rest-api/gravitee-apim-rest-api-management-v2/gravitee-apim-rest-api-management-v2-rest -Dlicense.skip=true -q
