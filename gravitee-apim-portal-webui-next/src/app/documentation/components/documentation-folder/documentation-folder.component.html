<app-sidenav-layout [breadcrumbs]="breadcrumbs()" [breadcrumbsLoading]="folderLoading()">
  @if (apiId()) {
    <div breadcrumbActions class="documentation-folder__breadcrumb-actions">
      @if (apiHasMcp()) {
        <button mat-stroked-button type="button" (click)="this.mcpDrawerOpen.set(true)" data-testid="mcp-button">
          <span i18n="@@documentationMcpButton">MCP</span>
        </button>
      }
      <button mat-stroked-button (click)="onSubscribe()" [disabled]="!currentUser()" data-testid="subscribe-button">
        @if (currentUser()) {
          <span i18n="@@subscribeToApiButton">Subscribe</span>
        } @else {
          <span i18n="@@signInToSubscribeButton">Sign in to subscribe</span>
        }
      </button>
    </div>
  }
  <div sidenavContent class="documentation-folder__sidenav__content">
    @if (folderLoading()) {
      <app-sidenav-skeleton
        animate.leave="documentation-folder__sidenav__skeleton--leave"
        class="documentation-folder__sidenav__skeleton"
        aria-busy="true"
        i18n-aria-label="@@documentationTreeLoadingAria"
        aria-label="Loading navigation"
      />
    } @else if (tree() && tree()!.length > 0) {
      <app-tree-component
        animate.enter="documentation-folder__sidenav__tree-enter"
        class="documentation-folder__sidenav__tree"
        [tree]="tree()"
        [selectedId]="selectedId$ | async"
        (selectNode)="onSelect($event)"
      />
    } @else {
      <div class="documentation-folder__sidenav__empty-state" i18n="@@emptyItemsLabel">No items to show</div>
    }
  </div>
  <div class="documentation-folder__main-content" mainContent>
    @if (contentLoading()) {
      <app-documentation-skeleton
        class="documentation-folder__main-content__skeleton"
        animate.leave="documentation-folder__main-content__skeleton--leave"
        aria-busy="true"
        i18n-aria-label="@@documentationContentLoadingAria"
        aria-label="Loading content"
      />
    } @else {
      <app-navigation-item-content-viewer
        animate.enter="documentation-folder__main-content-enter"
        [pageContent]="folderData()?.selectedPageContent ?? null"
      />
    }
  </div>
</app-sidenav-layout>

@if (mcpDrawerOpen()) {
  <div
    class="documentation-folder__mcp-backdrop"
    aria-hidden="true"
    tabindex="-1"
    animate.enter="documentation-folder__mcp-backdrop__enter"
    animate.leave="documentation-folder__mcp-backdrop__leave"
    (click)="this.mcpDrawerOpen.set(false)"
  ></div>
  <div
    class="documentation-folder__mcp-panel"
    data-testid="mcp-tools-drawer"
    cdkTrapFocus
    cdkTrapFocusAutoCapture
    animate.enter="documentation-folder__mcp-panel__enter"
    animate.leave="documentation-folder__mcp-panel__leave"
    role="dialog"
    aria-modal="true"
    i18n-aria-label="@@documentationMcpPanelAria"
    aria-label="MCP tools"
    [appIsMobile]="'documentation-folder__mcp-panel__mobile'"
    (keydown.escape)="mcpDrawerOpen.set(false)"
  >
    <app-api-tab-tools [api]="api.value()!" />
    <button class="documentation-folder__mcp-panel__close-button" mat-icon-button (click)="this.mcpDrawerOpen.set(false)">
      <span class="material-icons" i18n="@@documentationMcpPanelCloseButton">close</span>
    </button>
  </div>
}
