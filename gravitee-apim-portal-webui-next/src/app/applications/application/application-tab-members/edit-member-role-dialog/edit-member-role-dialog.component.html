<h2 mat-dialog-title class="edit-member-role-dialog__title" i18n="@@editMemberRoleDialogTitle">Edit Role</h2>

<mat-dialog-content class="edit-member-role-dialog__content">
  <p class="m3-body-medium" data-testid="dialog-member-name">{{ data.memberName }}</p>

  <mat-form-field appearance="outline" class="edit-member-role-dialog__select-field">
    <mat-label i18n="@@editMemberRoleDialogRoleLabel">Role</mat-label>
    <mat-select [(value)]="selectedRole" data-testid="role-select">
      @for (role of data.roles; track role.id) {
        <mat-option [value]="role.name" [attr.data-testid]="'role-option-' + role.name">{{ role.name }}</mat-option>
      }
    </mat-select>
  </mat-form-field>
</mat-dialog-content>

<mat-dialog-actions align="end" class="edit-member-role-dialog__actions">
  <button mat-button [mat-dialog-close]="null" data-testid="cancel-button" i18n="@@editMemberRoleDialogCancel">Cancel</button>
  <button
    mat-flat-button
    color="primary"
    [mat-dialog-close]="selectedRole"
    [disabled]="isSaveDisabled"
    data-testid="save-button"
    cdkFocusInitial
    i18n="@@editMemberRoleDialogSave"
  >
    Save
  </button>
</mat-dialog-actions>
