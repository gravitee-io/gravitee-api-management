<div mat-dialog-title i18n="@@addCertificateDialogTitle">Add certificate</div>
<mat-dialog-content>
  <form [formGroup]="form" class="add-certificate-form">
    <mat-form-field appearance="outline">
      <mat-label i18n="@@addCertificateDialogName">Name</mat-label>
      <input matInput formControlName="name" aria-label="Certificate name" data-testId="cert-name" />
      <mat-error i18n="@@addCertificateDialogNameRequired">Name is required</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label i18n="@@addCertificateDialogPem">Certificate (PEM)</mat-label>
      <textarea
        matInput
        formControlName="certificate"
        aria-label="Certificate PEM"
        data-testId="cert-pem"
        rows="8"
        placeholder="-----BEGIN CERTIFICATE-----&#10;...&#10;-----END CERTIFICATE-----"
      ></textarea>
      <mat-hint i18n="@@addCertificateDialogPemHint">Paste the PEM-encoded client certificate</mat-hint>
      <mat-error i18n="@@addCertificateDialogPemRequired">Certificate is required</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label i18n="@@addCertificateDialogEndsAt">Expiration date (optional)</mat-label>
      <input
        matInput
        [matDatepicker]="picker"
        formControlName="endsAt"
        [min]="minDate"
        aria-label="Expiration date"
        data-testId="cert-ends-at"
      />
      <mat-datepicker-toggle matIconSuffix [for]="picker" />
      <mat-datepicker #picker />
      <mat-hint i18n="@@addCertificateDialogEndsAtHint">When this certificate should stop being active</mat-hint>
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions>
  <button mat-button (click)="onCancel()" i18n="@@addCertificateDialogCancel" data-testId="cancel">Cancel</button>
  <button
    mat-flat-button
    color="primary"
    (click)="onAdd()"
    [disabled]="form.invalid"
    i18n="@@addCertificateDialogAdd"
    data-testId="confirm"
  >
    Add certificate
  </button>
</mat-dialog-actions>
