<div class="certificates">
  <div class="certificates__header">
    @if (canManage()) {
      <button mat-raised-button color="primary" i18n="@@uploadCertificate">Upload certificate</button>
    }
  </div>

  <table mat-table [dataSource]="certificates()">
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef i18n="@@certName">Name</th>
      <td mat-cell *matCellDef="let cert">{{ cert.name }}</td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef i18n="@@certStatus">Status</th>
      <td mat-cell *matCellDef="let cert">{{ cert.status }}</td>
    </ng-container>

    <ng-container matColumnDef="endsAt">
      <th mat-header-cell *matHeaderCellDef i18n="@@certExpiry">Expiry</th>
      <td mat-cell *matCellDef="let cert">{{ cert.endsAt | date }}</td>
    </ng-container>

    <ng-container matColumnDef="subject">
      <th mat-header-cell *matHeaderCellDef i18n="@@certSubject">Subject</th>
      <td mat-cell *matCellDef="let cert">{{ cert.subject }}</td>
    </ng-container>

    @if (canManage()) {
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef i18n="@@certActions">Actions</th>
        <td mat-cell *matCellDef="let cert">
          <button mat-icon-button i18n-aria-label="@@editCertificate" aria-label="Edit certificate">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button i18n-aria-label="@@deleteCertificate" aria-label="Delete certificate">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>
    }

    <tr mat-header-row *matHeaderRowDef="displayedColumns()"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns()"></tr>
  </table>
</div>
