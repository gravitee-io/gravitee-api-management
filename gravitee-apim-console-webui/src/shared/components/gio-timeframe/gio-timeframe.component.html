<mat-form-field>
  <mat-label>Timeframe</mat-label>
  <mat-select
    [disabled]="disabled"
    [value]="value.period"
    (selectionChange)="onPeriodChange($event.value)"
    [panelClass]="'select-with-radios'"
  >
    @for (timeFrame of timeFrames(); track timeFrame.id) {
      <mat-option [value]="timeFrame.id">
        <mat-radio-button
          class="in-option-radio"
          [checked]="value.period === timeFrame.id"
          [disabled]="disabled"
          disableRipple
          tabindex="-1"
          aria-hidden="true"
        >
          {{ timeFrame.label }}
        </mat-radio-button>
      </mat-option>
    }
  </mat-select>
</mat-form-field>

@if (value.period === customPeriod()) {
  <mat-form-field class="custom-date">
    <mat-label>From</mat-label>
    <input
      matInput
      [disabled]="disabled"
      [owlDateTime]="fromDateTimePicker"
      [owlDateTimeTrigger]="fromDateTimePicker"
      [max]="nowDate"
      [ngModel]="value.from"
      (ngModelChange)="onFromChange($event)"
    />
    <mat-icon (click)="fromDateTimePicker.open()" matSuffix svgIcon="gio:calendar"></mat-icon>
    <owl-date-time #fromDateTimePicker (afterPickerClosed)="onPickerClosed()"></owl-date-time>
  </mat-form-field>

  <mat-form-field class="custom-date">
    <mat-label>To</mat-label>
    <input
      matInput
      [disabled]="disabled"
      [owlDateTime]="toDateTimePicker"
      [owlDateTimeTrigger]="toDateTimePicker"
      [min]="minDate"
      [max]="nowDate"
      [ngModel]="value.to"
      (ngModelChange)="onToChange($event)"
    />
    <mat-icon (click)="toDateTimePicker.open()" matSuffix svgIcon="gio:calendar"></mat-icon>
    <owl-date-time #toDateTimePicker (afterPickerClosed)="onPickerClosed()"></owl-date-time>
  </mat-form-field>

  <button
    data-testid="apply-button"
    [disabled]="disabled || !value.from || !value.to"
    mat-stroked-button
    aria-label="Apply"
    (click)="onApplyClicked()"
  >
    Apply
  </button>
} @else {
  <button data-testid="refresh-button" mat-stroked-button aria-label="Refresh data" (click)="refresh.emit()">
    <mat-icon svgIcon="gio:refresh-cw"></mat-icon>
  </button>
}
