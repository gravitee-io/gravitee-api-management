<logs-list-base
  [logs]="logs()"
  [pagination]="pagination()"
  [columns]="columns()"
  tableId="apiRuntimeLogsTable"
  ariaLabel="Api logs table"
  (paginationUpdated)="paginationUpdated.emit($event)"
>
  <ng-template #timestampTemplate let-log>
    <a [routerLink]="'./' + log.requestId">{{ log.timestamp | date: 'dd/MM/yyyy HH:mm:ss.SSS' }}</a>
  </ng-template>

  <ng-template #methodTemplate let-log>
    <span [class]="'gio-method-badge-' + log.method.toLocaleLowerCase()">{{ log.method }}</span>
  </ng-template>

  <ng-template #statusTemplate let-log>
    <span
      [class.gio-badge-success]="log.status < 400"
      [class.gio-badge-warning]="log.status >= 400 && log.status <= 499"
      [class.gio-badge-error]="log.status >= 500"
      >{{ log.status }}</span
    >
  </ng-template>

  <ng-template #uriTemplate let-log>
    <span class="uri-column">{{ log.uri }}</span>
  </ng-template>

  <ng-template #applicationTemplate let-log>
    {{ log.application.name }}
  </ng-template>

  <ng-template #planTemplate let-log>
    {{ log.plan.name }}
  </ng-template>

  <ng-template #responseTimeTemplate let-log>
    {{ log.gatewayResponseTime + 'ms' }}
  </ng-template>

  <ng-template #endpointTemplate let-log>
    @if (!!log.endpoint) {
      <span class="gio-badge-neutral"><mat-icon svgIcon="gio:check"></mat-icon></span>
    }
  </ng-template>

  <ng-template #issuesTemplate let-log>
    <div class="diagnostics-container">
      @if (log.errorKey) {
        <span class="gio-badge-error" matTooltip="{{ log.errorKey }}">
          <mat-icon svgIcon="gio:alert-circle"></mat-icon>
        </span>
      }
      @if (log.warnings && log.warnings.length > 0) {
        <span
          class="gio-badge-warning"
          matTooltip="{{ log.warnings.length === 1 ? log.warnings[0].key : log.warnings.length + ' warning(s)' }}"
        >
          <mat-icon svgIcon="gio:alert-circle"></mat-icon>
        </span>
      }
    </div>
  </ng-template>

  <ng-template #actionsTemplate let-log>
    <div>
      <button
        mat-icon-button
        type="button"
        data-testid="api_logs_details_button"
        [routerLink]="'./' + log.requestId"
        aria-label="View API log details"
      >
        <mat-icon svgIcon="gio:eye-empty"></mat-icon>
      </button>
    </div>
  </ng-template>
</logs-list-base>
