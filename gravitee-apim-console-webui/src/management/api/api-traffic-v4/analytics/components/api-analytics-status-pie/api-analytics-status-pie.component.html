@if (vm$ | async; as vm) {
  <mat-card class="status-pie-card">
    <div class="status-pie-card__title">HTTP Status Codes</div>

    @switch (vm.status) {
      @case ('loading') {
        <div class="status-pie-card__loader">
          <gio-loader></gio-loader>
        </div>
      }
      @case ('loaded') {
        <div class="status-pie-card__chart">
          <gio-chart-pie
            [input]="vm.chartData"
            inputDescription="Requests"
            totalInputDescription="Total requests"
          ></gio-chart-pie>
        </div>
      }
      @case ('empty') {
        <gio-card-empty-state
          icon="bar-chart-2"
          title="No data"
          subtitle="No data for this timeframe"
          data-testid="empty-state"
        ></gio-card-empty-state>
      }
      @case ('error') {
        <div class="status-pie-card__error" data-testid="error-card">
          <mat-icon>error_outline</mat-icon>
          <span>Failed to load data</span>
        </div>
      }
    }
  </mat-card>
}
