<mat-card class="card">
  <mat-card-header>
    <mat-card-title>HTTP Status Distribution</mat-card-title>
    <mat-card-subtitle>Hits repartition by HTTP Status Code</mat-card-subtitle>
  </mat-card-header>

  @if (isLoading) {
    <div class="card__loader">
      <gio-loader></gio-loader>
    </div>
  } @else if (hasError) {
    <gio-card-empty-state icon="alert-circle" title="Analytics unavailable"></gio-card-empty-state>
  } @else if (isEmpty) {
    <gio-card-empty-state icon="bar-chart-2" title="No data" subtitle="No data available for this time range."></gio-card-empty-state>
  } @else {
    <gio-chart-pie [input]="pieData" inputDescription="Nb hits" totalInputDescription="Nb hits total"></gio-chart-pie>
  }
</mat-card>
