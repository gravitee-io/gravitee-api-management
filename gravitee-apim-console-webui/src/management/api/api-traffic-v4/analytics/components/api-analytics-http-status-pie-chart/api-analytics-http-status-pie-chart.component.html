<mat-card class="card">
  <div class="title">HTTP Status Codes</div>

  @if (chartInput$ | async; as state) {
    @if (state.isLoading) {
      <div class="card__loader">
        <gio-loader></gio-loader>
      </div>
    } @else if (!state.input || state.input.length === 0) {
      <gio-card-empty-state
        icon="pie-chart"
        title="No data"
        subtitle="No HTTP status data available for the selected period."
      ></gio-card-empty-state>
    } @else {
      <div class="card__chart">
        <gio-chart-pie
          [input]="state.input"
          inputDescription="Nb hits"
          totalInputDescription="Nb hits total"
          title="HTTP Status Codes"
        ></gio-chart-pie>
      </div>
    }
  }
</mat-card>
