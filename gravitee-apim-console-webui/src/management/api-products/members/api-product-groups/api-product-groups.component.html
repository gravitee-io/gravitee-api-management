<div class="api-product-groups">
  <div class="api-product-groups__header">
    <div class="api-product-groups__header__title" data-testid="api_product_groups_dialog_title">Manage groups</div>
    <div class="api-product-groups__header__subtitle">Give groups access to your API Product through the API Management console</div>
  </div>

  <form [formGroup]="form" (ngSubmit)="save()">
    <div class="api-product-groups__body">
      @if (!isReadOnly) {
        <mat-form-field appearance="outline" class="api-product-groups__field" subscriptSizing="dynamic">
          <mat-label>Groups</mat-label>
          <mat-select formControlName="selectedGroups" multiple>
            @for (availableGroup of groupsWithId; track availableGroup.id) {
              <mat-option [value]="availableGroup.id">{{ availableGroup.name }}</mat-option>
            }
          </mat-select>
        </mat-form-field>
      } @else {
        <section class="api-product-groups__read-only" aria-labelledby="api-product-groups-readonly-heading">
          <h3 id="api-product-groups-readonly-heading" class="mat-h4">Groups</h3>
          <div class="api-product-groups__body__read-only-groups">
            <div class="mat-subtitle-2">Associated groups</div>
            <span>{{ readOnlyGroupList }}</span>
          </div>
        </section>
      }
    </div>

    @if (!isReadOnly) {
      <div class="api-product-groups__actions">
        <button
          type="submit"
          color="primary"
          aria-label="Save API Product groups"
          mat-raised-button
          [disabled]="form.invalid"
          data-testid="api_product_groups_dialog_save"
        >
          Save
        </button>
      </div>
    }
  </form>
</div>
