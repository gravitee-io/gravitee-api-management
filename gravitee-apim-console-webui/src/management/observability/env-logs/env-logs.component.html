<gio-header title="Logs" subtitle="Inspect and analyze API runtime logs." />
<gio-banner-info class="banner-warning">
  <div class="banner-warning__content">
    Currently, only HTTP Proxy is supported.
    <span class="mat-body">Message APIs, SSEs, and webhook support are coming soon.</span>
  </div>
</gio-banner-info>

@if (error()) {
  <gio-banner-error>{{ error() }}</gio-banner-error>
}

<div class="env-logs__controls">
  <div class="env-logs__time-row">
    <gd-timeframe-selector
      [formControl]="filtersStore.periodControl"
      [timeFrames]="timeFrames"
      [customPeriod]="'custom'"
      (apply)="filtersStore.applyCustomTimeframe()"
      (refresh)="onRefresh()"
    />
  </div>

  <div class="env-logs__filters-row">
    <gd-dynamic-filter-bar
      [conditions]="filtersStore.conditions()"
      [editable]="true"
      (addRequested)="openAddFilter()"
      (editRequested)="openEditFilter($event.index, $event.condition)"
      (removeRequested)="onFilterRemoved($event)"
      (clearRequested)="onFilterCleared()"
    />
  </div>
</div>

<mat-card class="logs-section">
  <env-logs-table
    class="env-runtime-logs__table"
    [logs]="logs()"
    [showAssetTypeColumn]="true"
    [isLoading]="loading()"
    [pagination]="paginationWithTotal()"
    (paginationUpdated)="onPaginationUpdated($event)"
  />
</mat-card>
