<h2 mat-dialog-title>Delete Member</h2>
<mat-dialog-content>
  <form [formGroup]="deleteMemberForm" class="delete-member__form">
    <mat-form-field appearance="outline" *ngIf="member.roles['API'] === 'PRIMARY_OWNER'">
      <mat-label>Search Members</mat-label>
      <input aria-label="Search members" matInput formControlName="searchTerm" [matAutocomplete]="auto" />
      <mat-autocomplete #auto="matAutocomplete" (optionSelected)="selectPrimaryOwner($event)">
        <mat-option *ngFor="let member of filteredMembers | async" [value]="member">
          {{ member.displayName }}
        </mat-option>
      </mat-autocomplete>

      <mat-hint *ngIf="!selectedPrimaryOwner">{{ 'Please search members to transfer ownership' }}</mat-hint>
    </mat-form-field>

    <mat-list role="list" *ngIf="selectedPrimaryOwner">
      <mat-list-item>
        {{ selectedPrimaryOwner.displayName }}
        <button mat-button (click)="deselectPrimaryOwner()"><mat-icon svgIcon="gio:trash"></mat-icon></button>
      </mat-list-item>
    </mat-list>

    <mat-hint *ngIf="this.ownershipTransferMessage">{{ this.ownershipTransferMessage }}</mat-hint>
    <span> Are you sure, you want to delete {{ member.displayName }}? </span>
  </form>

  <mat-dialog-actions style="justify-content: flex-end">
    <button mat-raised-button color="warn" [disabled]="disableSubmit()" (click)="deleteMember()">Delete</button>
    <button mat-raised-button mat-dialog-close>Cancel</button>
  </mat-dialog-actions>
</mat-dialog-content>
