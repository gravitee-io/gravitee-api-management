kind: Analytics
group: analytics.gravitee.io
version: v2alpha1
spec:
  # Types define a partition of metrics across different API types.
  # This is to shorten the path when the end user defines a widget, a filter, a group ...
  apis:
    - http_proxy
    - message
    - kafka
    - llm
    - mcp

  # Metrics are data that will eventually be reported / graphed.
  # They are bound to a datasource so that we can infer where to apply queries from the metrics themselves.
  # Metrics have a type from which we can infer the vizualization to use.
  # counter: a value that can only increase in time
  #   visualizations: histogram, counter, pie_chart ...
  # gauge: a value that can increase and decrease in time
  #   visualizations: gauge, line_chart ...

  metrics:
    types:
      - name: counter
      - name: gauge
    intervals:
      - auto
    values:
      - name: http_request_count
        label: Request count
        apis:
          - http_proxy
          - llm
        type: counter
        aggregations:
          - rps
        defaultAggregation: count
        by:
          - api
          - application
          - plan
          - gateway
          - tenant
          - zone
          - http_method
          - http_status_code_group
          - http_status
          - http_path
          - http_path_mapping
          - http_user_agent_os_name
          - http_user_agent_device
          - host
          - geo_ip_country
          - geo_ip_region
          - geo_ip_city
          - geo_ip_continent
          - consumer_ip
        filter:
          - api
          - application
          - plan
          - gateway
          - tenant
          - zone
          - http_status_code_group
          - http_status
          - http_path
          - http_path_mapping
          - http_user_agent_os_name
          - http_user_agent_device
          - http_endpoint_response_time
          - http_gateway_latency
          - http_gateway_response_time
          - host
          - geo_ip_country
          - geo_ip_region
          - geo_ip_city
          - geo_ip_continent
          - consumer_ip
        backend:
          elasticsearch:
            indices:
              - v4-metrics
              - requests

      - name: http_request_content_length
        label: Request content length
        apis:
          - http_proxy
          - llm
        type: gauge
        unit: bytes
        aggregations:
