databaseChangeLog:
  - changeSet:
      id: 3.12.1
      author: GraviteeSource Team
      validCheckSum: ANY
      preConditions:
        - onFail: MARK_RAN
        - not:
            columnExists:
              tableName: ${gravitee_prefix}keys
              columnName: id
      changes:
        - addColumn:
            tableName: ${gravitee_prefix}keys
            columns:
              - column:
                  name: id
                  type: nvarchar(64)
        - sql:
            dbms: mariadb, mysql
            sql: update `${gravitee_prefix}keys` set `id` = `key`
        - sql:
            dbms: postgresql
            sql: update ${gravitee_prefix}keys set id = key
        - sql:
            dbms: mssql
            sql: update ${gravitee_prefix}keys set id = [key]
        - addNotNullConstraint:
            tableName: ${gravitee_prefix}keys
            columnDataType: nvarchar(64)
            columnName: id
        # Move PK from `key` to `id`. Combined ALTER for MySQL/MariaDB so
        # strict-PK mode does not reject the drop. The table name is `keys`
        # which is a MySQL reserved word, so the identifier MUST be backticked
        # here — typed dropPrimaryKey / addPrimaryKey actions auto-quote, but
        # raw <sql> does not, and an empty gravitee_prefix would otherwise
        # resolve to "ALTER TABLE keys …" and fail with a syntax error.
        - sql:
            dbms: mysql, mariadb
            sql: |
                ALTER TABLE `${gravitee_prefix}keys`
                    DROP PRIMARY KEY,
                    ADD CONSTRAINT `pk_${gravitee_prefix}keys` PRIMARY KEY (id);
        - sql:
            dbms: '!mysql, !mariadb'
            sql: ALTER TABLE ${gravitee_prefix}keys DROP CONSTRAINT pk_${gravitee_prefix}keys
        - sql:
            dbms: '!mysql, !mariadb'
            sql: ALTER TABLE ${gravitee_prefix}keys ADD CONSTRAINT pk_${gravitee_prefix}keys PRIMARY KEY (id)

        - addColumn:
            tableName: ${gravitee_prefix}keys
            columns:
              - column:
                  name: api
                  type: nvarchar(64)
        - sql:
            dbms: mariadb, mysql
            sql: update `${gravitee_prefix}keys` set api = ( select s.api from ${gravitee_prefix}subscriptions s where s.id = subscription)
        - sql:
            dbms: postgresql, mssql
            sql: update ${gravitee_prefix}keys set api = ( select s.api from ${gravitee_prefix}subscriptions s where s.id = subscription)
        - addNotNullConstraint:
            tableName: ${gravitee_prefix}keys
            columnDataType: nvarchar(64)
            columnName: api
        - createIndex:
            indexName: idx_${gravitee_prefix}keys_key
            columns:
              - column:
                  name: key
                  type: nvarchar(64)
            tableName: ${gravitee_prefix}keys
        - createIndex:
            indexName: idx_${gravitee_prefix}keys_key_and_api
            columns:
              - column:
                  name: api
                  type: nvarchar(64)
              - column:
                  name: key
                  type: nvarchar(64)
            tableName: ${gravitee_prefix}keys
