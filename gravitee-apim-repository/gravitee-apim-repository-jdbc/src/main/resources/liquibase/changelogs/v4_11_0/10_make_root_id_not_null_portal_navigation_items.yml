databaseChangeLog:
  - changeSet:
      id: 4.11.0_10_make_root_id_not_null_portal_navigation_items
      author: GraviteeSource Team
      changes:
        - sql:
            sql: UPDATE ${gravitee_prefix}portal_navigation_items SET root_id = '00000000-0000-0000-0000-000000000000' WHERE root_id IS NULL OR TRIM(root_id) = ''
        - addNotNullConstraint:
            tableName: ${gravitee_prefix}portal_navigation_items
            columnName: root_id
            columnDataType: nvarchar(64)
