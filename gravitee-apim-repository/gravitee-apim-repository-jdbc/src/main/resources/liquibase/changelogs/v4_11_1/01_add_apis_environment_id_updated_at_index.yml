databaseChangeLog:
  - changeSet:
      id: 4.11.1_01_add_apis_environment_id_updated_at_index
      author: GraviteeSource Team
      changes:
        - createIndex:
            indexName: idx_${gravitee_prefix}apis_env_updated_at
            tableName: ${gravitee_prefix}apis
            columns:
              - column:
                  name: environment_id
                  type: nvarchar(64)
              - column:
                  name: updated_at
                  type: timestamp(6)
                  descending: true
