databaseChangeLog:
  - changeSet:
      id: 4.13.0_00_add_api_product_api_operations_table
      author: GraviteeSource Team
      changes:
        - createTable:
            tableName: ${gravitee_prefix}api_product_api_operations
            columns:
              - column: { name: api_product_id, type: nvarchar(64),   constraints: { nullable: false } }
              - column: { name: api_id,         type: nvarchar(64),   constraints: { nullable: false } }
              - column: { name: path,           type: nvarchar(1024), constraints: { nullable: false } }
              - column: { name: method,         type: nvarchar(16),   constraints: { nullable: false } }
        - addPrimaryKey:
            constraintName: pk_${gravitee_prefix}api_product_api_operations
            columnNames: api_product_id, api_id, path, method
            tableName: ${gravitee_prefix}api_product_api_operations
        - createIndex:
            indexName: idx_${gravitee_prefix}api_product_api_operations_product_api
            tableName: ${gravitee_prefix}api_product_api_operations
            columns:
              - column: { name: api_product_id }
              - column: { name: api_id }
      rollback:
        - dropTable:
            tableName: ${gravitee_prefix}api_product_api_operations
