databaseChangeLog:
  - changeSet:
      id: 3.5.0
      author: GraviteeSource Team
      validCheckSum: ANY
      changes:
        - addNotNullConstraint:
            tableName: ${gravitee_prefix}parameters
            columnDataType: nvarchar(32)
            columnName: reference_type
        # Rebuild PK (key) → (key, reference_id, reference_type). Combined
        # ALTER for MySQL/MariaDB so strict-PK mode does not reject the drop.
        - sql:
            dbms: mysql, mariadb
            sql: |
                ALTER TABLE ${gravitee_prefix}parameters
                    DROP PRIMARY KEY,
                    ADD CONSTRAINT pk_${gravitee_prefix}parameters PRIMARY KEY (`key`, reference_id, reference_type);
        # Typed dropPrimaryKey / addPrimaryKey honour the dbms filter inconsistently
        # on individual change-actions in our pinned Liquibase — they were observed
        # to run on MySQL even with dbms: '!mysql, !mariadb' and then trip
        # sql_require_primary_key=ON. Stick to raw <sql> here, where dbms is
        # honoured reliably; the MySQL/MariaDB combined ALTER above already covers
        # those engines.
        - sql:
            dbms: '!mysql, !mariadb'
            sql: ALTER TABLE ${gravitee_prefix}parameters DROP CONSTRAINT pk_${gravitee_prefix}parameters
        - sql:
            dbms: '!mysql, !mariadb'
            sql: ALTER TABLE ${gravitee_prefix}parameters ADD CONSTRAINT pk_${gravitee_prefix}parameters PRIMARY KEY ("key", reference_id, reference_type)
        # dbms: mariadb, mysql
        - sql:
            dbms: mariadb, mysql
            sql: insert into ${gravitee_prefix}parameters (`key`, reference_id, reference_type, value) select CONCAT('console.', `key`), 'DEFAULT', 'ORGANIZATION', value from ${gravitee_prefix}parameters where (`key` = 'authentication.localLogin.enabled' or `key` like 'scheduler.%' or `key` like 'reCaptcha.%' or `key` like 'http.cors.%');
        - sql:
            dbms: mariadb, mysql
            sql: insert into ${gravitee_prefix}parameters (`key`, reference_id, reference_type, value) select 'console.support.enabled', 'DEFAULT', 'ORGANIZATION', value from ${gravitee_prefix}parameters where `key` = 'portal.support.enabled';
        - sql:
            dbms: mariadb, mysql
            sql: insert into ${gravitee_prefix}parameters (`key`, reference_id, reference_type, value) select 'console.userCreation.enabled', 'DEFAULT', 'ORGANIZATION', value from ${gravitee_prefix}parameters where `key` = 'portal.userCreation.enabled';
        - sql:
            dbms: mariadb, mysql
            sql: insert into ${gravitee_prefix}parameters (`key`, reference_id, reference_type, value) select 'console.userCreation.automaticValidation.enabled', 'DEFAULT', 'ORGANIZATION', value from ${gravitee_prefix}parameters where `key` = 'portal.userCreation.automaticValidation.enabled';
        - sql:
            dbms: mariadb, mysql
            sql: update ${gravitee_prefix}parameters set `key` = CONCAT('portal.', `key`) where (`key` = 'authentication.localLogin.enabled' or `key` = 'authentication.forceLogin.enabled' or `key` like 'scheduler.%' or `key` like 'reCaptcha.%' or `key` like 'http.cors.%');

        # dbms: postgres
        - sql:
            dbms: postgres
            sql: insert into ${gravitee_prefix}parameters ("key", reference_id, reference_type, value) select CONCAT('console.', "key"), 'DEFAULT', 'ORGANIZATION', value from ${gravitee_prefix}parameters where ("key" = 'authentication.localLogin.enabled' or "key" like 'scheduler.%' or "key" like 'reCaptcha.%' or "key" like 'http.cors.%');
        - sql:
            dbms: postgres
            sql: insert into ${gravitee_prefix}parameters ("key", reference_id, reference_type, value) select 'console.support.enabled', 'DEFAULT', 'ORGANIZATION', value from ${gravitee_prefix}parameters where "key" = 'portal.support.enabled';
        - sql:
            dbms: postgres
            sql: insert into ${gravitee_prefix}parameters ("key", reference_id, reference_type, value) select 'console.userCreation.enabled', 'DEFAULT', 'ORGANIZATION', value from ${gravitee_prefix}parameters where "key" = 'portal.userCreation.enabled';
        - sql:
            dbms: postgres
            sql: insert into ${gravitee_prefix}parameters ("key", reference_id, reference_type, value) select 'console.userCreation.automaticValidation.enabled', 'DEFAULT', 'ORGANIZATION', value from ${gravitee_prefix}parameters where "key" = 'portal.userCreation.automaticValidation.enabled';
        - sql:
            dbms: postgres
            sql: update ${gravitee_prefix}parameters set "key" = CONCAT('portal.', "key") where ("key" = 'authentication.localLogin.enabled' or "key" = 'authentication.forceLogin.enabled' or "key" like 'scheduler.%' or "key" like 'reCaptcha.%' or "key" like 'http.cors.%');

        # dbms: mssql
        - sql:
            dbms: mssql
            sql: insert into ${gravitee_prefix}parameters ([key], reference_id, reference_type, value) select CONCAT('console.', [key]), 'DEFAULT', 'ORGANIZATION', value from ${gravitee_prefix}parameters where ([key] = 'authentication.localLogin.enabled' or [key] like 'scheduler.%' or [key] like 'reCaptcha.%' or [key] like 'http.cors.%');
        - sql:
            dbms: mssql
            sql: insert into ${gravitee_prefix}parameters ([key], reference_id, reference_type, value) select 'console.support.enabled', 'DEFAULT', 'ORGANIZATION', value from ${gravitee_prefix}parameters where [key] = 'portal.support.enabled';
        - sql:
            dbms: mssql
            sql: insert into ${gravitee_prefix}parameters ([key], reference_id, reference_type, value) select 'console.userCreation.enabled', 'DEFAULT', 'ORGANIZATION', value from ${gravitee_prefix}parameters where [key] = 'portal.userCreation.enabled';
        - sql:
            dbms: mssql
            sql: insert into ${gravitee_prefix}parameters ([key], reference_id, reference_type, value) select 'console.userCreation.automaticValidation.enabled', 'DEFAULT', 'ORGANIZATION', value from ${gravitee_prefix}parameters where [key] = 'portal.userCreation.automaticValidation.enabled';
        - sql:
            dbms: mssql
            sql: update ${gravitee_prefix}parameters set [key] = CONCAT('portal.', [key]) where ([key] = 'authentication.localLogin.enabled' or [key] = 'authentication.forceLogin.enabled' or [key] like 'scheduler.%' or [key] like 'reCaptcha.%' or [key] like 'http.cors.%');
