databaseChangeLog:
  - changeSet:
      id: 4.12.0_05_add_lifecycle_to_clusters_table
      author: GraviteeSource Team
      changes:
        - addColumn:
            tableName: ${gravitee_prefix}clusters
            columns:
              - column:
                  name: lifecycle_state
                  type: nvarchar(64)
              - column:
                  name: deployed_at
                  type: timestamp(6)
              - column:
                  name: version
                  type: int
